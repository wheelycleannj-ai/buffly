const parseCSV = (text) => {
  const rows = []; let field = '', row = [], inQ = false; let i = 0;
  text = text.replace(/^\uFEFF/, '');
  while (i < text.length) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { row.push(field); field = ''; }
    else if (ch === '\n' || ch === '\r') { if (ch === '\r' && text[i + 1] === '\n') i++; row.push(field); rows.push(row); row = []; field = ''; }
    else field += ch;
    i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter((r) => r.some((c) => (c || '').trim() !== ''));
};

    img.onload = () => {
      const maxD = 420; let { width, height } = img;
      if (width > maxD || height > maxD) { const r = Math.min(maxD / width, maxD / height); width = Math.round(width * r); height = Math.round(height * r); }

};

const Modal = ({ title, sub, onClose, children, footer, wide }) => {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className="cb-overlay" onMouseDown={onClose}>
      <div className={`cb-modal${wide ? ' cb-modal-wide' : ''}`} onMouseDown={(e) => e.stopPropagation()}>
        <div className="cb-modal-head">
          <div><h3 className="cb-modal-title">{title}</h3>{sub && <p className="cb-modal-sub">{sub}</p>}</div>
          <button className="cb-icon-btn" onClick={onClose} aria-label="Close"><X size={18} /></button>
        </div>
        <div className="cb-modal-body">{children}</div>
        {footer && <div className="cb-modal-foot">{footer}</div>}
      </div>
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch() {}
  render() {
    if (this.state.err) return (
      <div className="cb-card" style={{ padding: 24, margin: '8px 0' }}>
        <div className="cb-h2" style={{ marginBottom: 6 }}>This screen hit a snag.</div>
        <div className="cb-row-sub" style={{ marginBottom: 14 }}>No data was lost — pick another tab on the left, or try again.</div>
        <button className="cb-btn cb-btn-ghost" onClick={() => this.setState({ err: null })}>Try again</button>
      </div>
    );
    return this.props.children;
  }
}

  const [authStep, setAuthStep] = useState('profiles');
  const [newShop, setNewShop] = useState({ shopName: '', ownerName: '', email: '' });
  const [view, setView] = useState('dashboard');
  const [customers, setCustomers] = useState(seedCustomers);
  const [jobs, setJobs] = useState(seedJobs);
  const [quotes, setQuotes] = useState(seedQuotes);
  const [invoices, setInvoices] = useState(seedInvoices);
  const [inventory, setInventory] = useState(seedInventory);
  const [invLog, setInvLog] = useState(seedInvLog);
  const [timeEntries, setTimeEntries] = useState(seedTime);
  const [campaigns, setCampaigns] = useState(seedCampaigns);
  const [coupons, setCoupons] = useState(seedCoupons);
  const [giftcards, setGiftcards] = useState(seedGiftcards);
  const [promoTab, setPromoTab] = useState('coupons');
  const [ncoupon, setNcoupon] = useState({ code: '', type: 'percent', value: 10, note: '' });
  const [ngift, setNgift] = useState({ amount: 100, recipient: '', email: '', message: '' });
  const saveCoupon = () => { const code = ncoupon.code.trim().toUpperCase(); if (!code || !Number(ncoupon.value)) return; setCoupons((p) => [{ id: uid(), code, type: ncoupon.type, value: Number(ncoupon.value), active: true, uses: 0, note: ncoupon.note }, ...p]); setModal(null); };

    const daysSince = (d) => Math.round((new Date(TODAY + 'T00:00:00') - new Date(d + 'T00:00:00')) / 86400000);
    const rows = customers.filter((c) => last[c.id] && !hasUpcoming(c.id) && daysSince(last[c.id]) >= 60)

    const tier = (d) => (d >= 120 ? { t: 'Cold', cls: 'cold' } : d >= 90 ? { t: 'Overdue', cls: 'over' } : { t: 'Due soon', cls: 'due' });

            dest = [c && c.address, c && c.town, c && c.state, c && c.zip].filter((s) => s && s !== '—').join(', ');
          }
          const durl = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(dest || 'Whippany NJ');
          pts.push([lat, lng]);
          L.circleMarker([lat, lng], { radius: 9, color: '#fff', weight: 2, fillColor: colorFor(j.resource), fillOpacity: 0.95 }).addTo(map)
            .bindPopup(`<b>${j.time} — ${j.name}</b><br>${j.service}<br>${place} · ${resLabel(j.resource)}<br><a href="${durl}" target="_blank" rel="noopener" style="color:#2F6BD8;font-weight:700;text-decoration:none">Open in Google Maps ›</a>`);

          const stops = jobs.filter((j) => j.date === schedDate && j.resource === van).map((j) => { const c = customers.find((x) => x.id === j.customerId); const t = ((c && c.town) || '').split(',')[0].trim().toLowerCase(); const co = NJ_TOWNS[t]; return co ? { lat: co[0], lng: co[1] } : null; }).filter(Boolean);
          if (stops.length) { const ord = optimizeRoute(stops); const line = [[SHOP.lat, SHOP.lng], ...ord.map((s) => [s.lat, s.lng])]; L.polyline(line, { color: van === 'Van 1' ? '#2F6BD8' : '#F26A1B', weight: 3, opacity: 0.45, dashArray: '7 7' }).addTo(map); }

                    <button className={lt === 'In-Shop' ? 'on' : ''} onClick={() => setBk({ ...bk, locationType: 'In-Shop' })}>In-shop{settings.bizAddress && settings.bizAddress.split(',')[1] ? ` — ${settings.bizAddress.split(',')[1].trim()}` : ''}</button>
                  </div>
                  {shopOnly && <div className="cb-book-note">This package is shop-only (paint correction bay).</div>}
                  <div className="cb-svc-grid">
                    {services.length === 0 ? <div className="cb-svc-empty">This shop is still setting up its services — check back soon.</div> : services.map((s) => (
                      <button key={s.id} className={`cb-svc${bk.service.id === s.id ? ' sel' : ''}`} onClick={() => setBk({ ...bk, service: s, locationType: s.shopOnly ? 'In-Shop' : bk.locationType })}>
                        <div className="cb-svc-top"><span className="cb-svc-name">{s.name}</span>{bk.service.id === s.id && <Check size={16} className="cb-svc-check" />}</div>
                        <div className="cb-svc-blurb">{s.blurb}</div>
                        <div className="cb-svc-price">{s.sizes ? 'from ' + money(startPrice(s)) : money(s.price)}</div>
                      </button>
                    ))}
                  </div>
                  <button className="cb-giftcard-cta" onClick={() => { setBookMode('gift'); setGiftDone(null); }}>
                    <div className="cb-giftcard-cta-ic"><Gift size={20} /></div>
                    <div className="cb-giftcard-cta-tx"><div className="cb-giftcard-cta-h">Give the gift of clean</div><div className="cb-giftcard-cta-sub">Buy a gift card — any amount, delivered by email.</div></div>
                    <ArrowRight size={18} className="cb-giftcard-cta-arr" />
                  </button>
                  {settings.reviews && settings.reviews.length ? (
                  <div className="cb-reviews">
                    {settings.reviews.map((r, i) => (
                      <div key={i} className="cb-rev">
                        <div className="cb-rev-stars">{'★'.repeat(r.stars)}</div>
                        <div className="cb-rev-text">“{r.text}”</div>
                        <div className="cb-rev-by">{r.name} · {r.town}</div>
                      </div>
                    ))}
                  </div>
                  ) : null}
                  {settings.igUrl ? <a className="cb-ig" href={settings.igUrl} target="_blank" rel="noopener noreferrer">See our work on Instagram →</a> : null}
                </>
              )}

              {bk.step === 2 && (
                <>
                  <h2 className="cb-book-h">What size is your vehicle?</h2>
                  <p className="cb-dur-note">{bk.service.name}{bk.service.sizes ? '' : ' · one flat price'}</p>
                  <div className="cb-size-grid">
                    {VEHICLE_SIZES.map((v) => (
                      <button key={v.k} className={`cb-size${bk.size === v.k ? ' sel' : ''}`} onClick={() => setBk({ ...bk, size: v.k })}>
                        {bk.size === v.k && <Check size={15} className="cb-size-check" />}
                        <span className="cb-size-name">{v.label}</span>
                        <span className="cb-size-price">{money(priceFor(bk.service, v.k))}</span>
                      </button>
                    ))}
                  </div>
                  {!bk.service.sizes && <div className="cb-book-note">{bk.service.name} is one flat price for any vehicle — pick the closest match so our crew shows up with the right gear.</div>}
                </>
              )}

              {bk.step === 3 && (
                <>
                  <h2 className="cb-book-h">Add extras <span className="cb-h-opt">(optional)</span></h2>
                  <p className="cb-dur-note">{bk.service.name} · {sizeLabel}</p>
                  <div className="cb-addons">
                    {addons.map((a) => { const on = bk.addons.includes(a.id); return (
                      <button key={a.id} className={`cb-addon${on ? ' on' : ''}`} onClick={() => toggleAddon(a.id)}>
                        <span className="cb-addon-check">{on ? <Check size={13} /> : <Plus size={13} />}</span>
                        <span className="cb-addon-name">{a.name}</span><span className="cb-addon-price">{money(a.price)}</span>
                      </button>
                    ); })}
                  </div>
                  <div className="cb-book-total">Your estimate<strong>{money(bookTotal)}</strong></div>
                  <p className="cb-book-fine">Price shown for a {sizeLabel.toLowerCase()}. Final quote confirmed once we see the vehicle. Gift cards available: $50 / $100 / $250 / $500.</p>
                </>
              )}

              {bk.step === 4 && (
                <>
                  <h2 className="cb-book-h">Pick a day &amp; time</h2>
                  <p className="cb-dur-note">{bk.service.name} · {durLabel(bk.service.name)}</p>
                  <div className="cb-date-strip">
                    {nextDays(21).map((d) => { const c = dayChip(d); const isT = d === TODAY; return (
                      <button key={d} className={`cb-date${bk.date === d ? ' sel' : ''}`} onClick={() => setBk({ ...bk, date: d, time: '' })}>
                        <span className="cb-date-dow">{isT ? 'Today' : c.dow}</span><span className="cb-date-day">{c.day}</span><span className="cb-date-mon">{c.mon}</span>
                      </button>
                    ); })}
                  </div>
                  {!bk.date ? <div className="cb-book-empty">Choose a day to see open times.</div> : (
                    <div className="cb-slot-grid">
                      {BOOK_SLOTS.map((s) => { const open = slotOpen(bk.date, s, lt, bk.service.name).length; const full = open === 0; return (
                        <button key={s.label} className={`cb-slot${bk.time === s.label ? ' sel' : ''}${full ? ' full' : ''}`} disabled={full} onClick={() => setBk({ ...bk, time: s.label })}>
                          <span className="cb-slot-time">{s.label}</span><span className="cb-slot-open">{full ? 'Full' : `${open} open`}</span>
                        </button>
                      ); })}
                    </div>
                  )}
                </>
              )}

              {bk.step === 5 && (
                <>
                  <h2 className="cb-book-h">Your details</h2>
                  <Field label="Full name"><input className="cb-input" value={bk.name} onChange={(e) => setBk({ ...bk, name: e.target.value })} placeholder="Jane Doe" /></Field>
                  <div className="cb-two">
                    <Field label="Phone"><input className="cb-input" value={bk.phone} onChange={(e) => setBk({ ...bk, phone: e.target.value })} placeholder="973-555-0000" /></Field>
                    <Field label="Email"><input className="cb-input" value={bk.email} onChange={(e) => setBk({ ...bk, email: e.target.value })} placeholder="jane@email.com" /></Field>
                  </div>
                  {lt === 'Mobile' ? (
                    <>
                      <Field label="Service address">
                        <div className="cb-addr">
                          <input className="cb-input" value={bk.address} autoComplete="off" onChange={(e) => { setBk({ ...bk, address: e.target.value }); queryAddr(e.target.value); }} placeholder="Start typing a street address…" />
                          {addrSuggestBox(setBk)}
                        </div>
                      </Field>
                      <div className="cb-three">
                        <Field label="Town / City"><input className="cb-input" value={bk.town} onChange={(e) => setBk({ ...bk, town: e.target.value })} placeholder="Morristown" /></Field>
                        <Field label="State"><input className="cb-input" value={bk.state} onChange={(e) => setBk({ ...bk, state: e.target.value })} placeholder="NJ" /></Field>
                        <Field label="Zip"><input className="cb-input" value={bk.zip} onChange={(e) => setBk({ ...bk, zip: e.target.value })} placeholder="07960" /></Field>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="cb-book-note">Drop-off at 355 State Route 10, Whippany, NJ.</div>
                      <Field label="Town / City you're in"><input className="cb-input" value={bk.town} onChange={(e) => setBk({ ...bk, town: e.target.value })} placeholder="Morristown" /></Field>
                    </>
                  )}
                  <div className="cb-three">
                    <Field label="Year"><input className="cb-input" value={bk.year} onChange={(e) => setBk({ ...bk, year: e.target.value })} placeholder="2022" /></Field>
                    <Field label="Make"><input className="cb-input" value={bk.make} onChange={(e) => setBk({ ...bk, make: e.target.value })} placeholder="BMW" /></Field>
                    <Field label="Model"><input className="cb-input" value={bk.model} onChange={(e) => setBk({ ...bk, model: e.target.value })} placeholder="X5" /></Field>
                  </div>
                </>
              )}

              {bk.step === 6 && (
                <>
                  <h2 className="cb-book-h">Review &amp; confirm</h2>
                  <div className="cb-review">
                    <div className="cb-review-row"><span>Service</span><strong>{bk.service.name}{bk.service.sizes ? ` · ${sizeLabel}` : ''}</strong></div>
                    <div className="cb-review-row"><span>Service price</span><strong>{money(corePrice)}</strong></div>
                    {addonItems.map((a) => <div key={a.id} className="cb-review-row"><span>+ {a.name}</span><strong>{money(a.price)}</strong></div>)}
                    <div className="cb-review-row"><span>Where</span><strong>{lt === 'Mobile' ? `Mobile · ${bk.address}${bk.town ? ', ' + bk.town : ''}` : (settings.bizAddress && settings.bizAddress.split(',')[1] ? 'In-shop · ' + settings.bizAddress.split(',')[1].trim() : 'In-shop')}</strong></div>
                    <div className="cb-review-row"><span>When</span><strong>{niceDate(bk.date)} · {bk.time}</strong></div>
                    <div className="cb-review-row"><span>Vehicle</span><strong>{bk.year} {bk.make} {bk.model}</strong></div>
                    <div className="cb-review-row"><span>Contact</span><strong>{bk.name} · {bk.phone}</strong></div>
                    <div className="cb-promo">
                      <div className="cb-promo-in">
                        <input className="cb-input" value={bk.promoInput} onChange={(e) => setBk({ ...bk, promoInput: e.target.value, promoErr: '' })} placeholder="Gift card or promo code" />
                        <button type="button" className="cb-btn cb-btn-ghost" onClick={applyPromo}>Apply</button>
                      </div>
                      {bk.promo && <div className="cb-promo-ok"><Check size={13} /> {bk.promo.kind === 'gift' ? `Gift card applied` : `Code ${bk.promo.code} applied`}{bk.promo.kind === 'coupon' ? ` — ${bk.promo.type === 'percent' ? bk.promo.value + '% off' : money(bk.promo.value) + ' off'}` : ` — ${money(bk.promo.balance)} available`} <button type="button" className="cb-promo-x" onClick={() => setBk({ ...bk, promo: null, promoInput: '', promoErr: '' })}>remove</button></div>}
                      {bk.promoErr && <div className="cb-promo-err">{bk.promoErr}</div>}
                    </div>
                    <div className="cb-review-row cb-review-total"><span>Estimate total</span><strong>{money(bookTotal)}</strong></div>
                    {bookDisc > 0 && <div className="cb-review-row cb-review-disc"><span>Discount{bk.promo ? ` (${bk.promo.code})` : ''}</span><strong>−{money(bookDisc)}</strong></div>}
                    {bookDisc > 0 && <div className="cb-review-row cb-review-total"><span>New total</span><strong>{money(bookFinal)}</strong></div>}
                    <div className="cb-review-row cb-review-dep"><span>Deposit due now (25%)</span><strong>{money(bookDep)}</strong></div>
                    <div className="cb-review-row"><span>Balance at service</span><strong>{money(bookFinal - bookDep)}</strong></div>
                  </div>
                  <p className="cb-book-fine">A {money(bookDep)} deposit holds your spot; the balance is due at service. We'll text or call to confirm. {(settings.processor === 'stripe' && settings.stripeOn) ? 'Secure checkout powered by Stripe.' : (settings.processor === 'square' && settings.squareOn) ? 'Secure checkout powered by Square.' : '(Demo — no card is charged.)'}</p>
                </>
              )}

              {bk.step === 7 && (
                <div className="cb-confirm">
                  <div className="cb-confirm-check"><Check size={30} strokeWidth={3} /></div>
                  <h2 className="cb-book-h" style={{ textAlign: 'center' }}>You're booked!</h2>
                  <p className="cb-confirm-ref">Confirmation {bkRef}</p>
                  <div className="cb-review" style={{ marginTop: 6 }}>
                    <div className="cb-review-row"><span>Service</span><strong>{bk.service.name}</strong></div>
                    <div className="cb-review-row"><span>When</span><strong>{niceDate(bk.date)} · {bk.time}</strong></div>
                    <div className="cb-review-row"><span>Where</span><strong>{lt === 'Mobile' ? 'Mobile to you' : (settings.bizAddress && settings.bizAddress.split(',')[1] ? 'In-shop · ' + settings.bizAddress.split(',')[1].trim() : 'In-shop')}</strong></div>
                    <div className="cb-review-row cb-review-dep"><span>Deposit paid</span><strong>{money(bookDep)}</strong></div>
                    <div className="cb-review-row"><span>Balance at service</span><strong>{money(bookFinal - bookDep)}</strong></div>
                  </div>
                  <div className="cb-sent">
                    <div className="cb-sent-head"><Mail size={14} /> Confirmation emailed to {bk.email}</div>
                    <div className="cb-email-prev">
                      <div className="cb-email-subj">Your Wheely Clean booking — {bkRef}</div>
                      <div className="cb-email-body">Hi {bk.name.split(' ')[0]}, thanks for booking! Here's what we've got:<br />{bk.service.name}{bk.service.sizes ? ` (${sizeLabel})` : ''} · {niceDate(bk.date)} at {bk.time}<br />{addonItems.length ? `Add-ons: ${addonItems.map((a) => a.name).join(', ')}` : ''}{addonItems.length ? <br /> : ''}{lt === 'Mobile' ? `We'll come to ${bk.address}${bk.town ? ', ' + bk.town : ''}.` : (settings.bizAddress ? `Drop-off at ${settings.bizAddress}.` : 'Drop-off at our shop.')}<br />Estimate {money(bookTotal)} — final price confirmed at the vehicle.{settings.bizPhone ? <><br />Need to change it? Call or text {settings.bizPhone}.</> : null}</div>
                    </div>
                    <div className="cb-sent-head" style={{ marginTop: 12 }}><MessageSquare size={14} /> Text sent to {bk.phone}</div>
                    <div className="cb-sms-bubble">Wheely Clean: You're booked! {bk.service.name} on {niceDate(bk.date)} at {bk.time} · est {money(bookTotal)}. Ref {bkRef}. Reply C to confirm — questions? 973-886-7171</div>
                  </div>
                  <p className="cb-confirm-msg">We'll reach out shortly to confirm. Questions? Call <strong>973-886-7171</strong>.</p>
                  <div className="cb-confirm-btns">
                    <Btn variant="ghost" onClick={() => { resetBooking(); }}>Book another</Btn>
                    <Btn variant="primary" icon={Check} onClick={() => { resetBooking(); }}>Done</Btn>
                  </div>
                </div>
              )}

              {bk.step < 7 && (
                <div className="cb-book-nav">
                  <button className="cb-book-back" onClick={goBack}>{bk.step === 1 ? 'Cancel' : 'Back'}</button>
                  {bk.step < 6
                    ? <Btn variant="primary" icon={ArrowRight} disabled={!bookValid()} onClick={() => bookValid() && setBk((b) => ({ ...b, step: b.step + 1 }))}>Continue</Btn>
                    : <Btn variant="primary" icon={Check} disabled={!bookValid()} onClick={confirmBooking}>Pay deposit &amp; book</Btn>}
                </div>
              )}
              </>)}
            </div>

            <footer className="cb-book-trust">Small business owned · Licensed &amp; insured{settings.tagline ? ` · ${settings.tagline}` : ''}{settings.bizPhone ? ` · ${settings.bizPhone}` : ''}</footer>
          </div>
          {settings.chatOn && (
            <div className="cb-chat-wrap">
              {chatOpen && (
                <div className="cb-chat">
                  <div className="cb-chat-head">
                    <div className="cb-chat-id"><div className="cb-chat-av"><Sparkles size={14} /></div><div><div className="cb-chat-name">Wheely Clean Assistant</div><div className="cb-chat-status">Typically replies instantly</div></div></div>
                    <button className="cb-chat-x" onClick={() => setChatOpen(false)} aria-label="Close chat"><X size={16} /></button>
                  </div>
                  <div className="cb-chat-body">
                    {chatMsgs.map((m, i) => <div key={i} className={`cb-chat-msg ${m.role}`}>{m.text}</div>)}
                  </div>
                  <div className="cb-chat-quick">
                    {['Pricing?', 'Do you come to me?', 'How do I book?'].map((q) => <button key={q} onClick={() => sendChat(q)}>{q}</button>)}
                  </div>
                  <div className="cb-chat-input">
                    <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') sendChat(); }} placeholder="Ask a question…" />
                    <button onClick={() => sendChat()} aria-label="Send"><Send size={16} /></button>
                  </div>
                </div>
              )}
              <button className="cb-chat-fab" onClick={() => setChatOpen((o) => !o)} aria-label="Chat with us">{chatOpen ? <X size={22} /> : <MessageSquare size={22} />}</button>
            </div>
          )}
        </div>
      </>
    );
  };

  /* ----------------------------- login gate ----------------------------- */
  if (currentUser && previewBooking) return (
    <>
      <div className="cb-prev-bar">
        <span className="cb-prev-tag"><Eye size={14} /> Customer preview</span>
        <div className="cb-prev-seg">
          <button className={previewDevice === 'desktop' ? 'on' : ''} onClick={() => setPreviewDevice('desktop')}><Monitor size={14} /> Desktop</button>
          <button className={previewDevice === 'phone' ? 'on' : ''} onClick={() => setPreviewDevice('phone')}><Smartphone size={14} /> Phone</button>
        </div>
        <span className="cb-prev-spacer" />
        <button className="cb-prev-copy" onClick={copyBookingLink}>{linkCopied ? <><Check size={14} /> Copied!</> : <><Copy size={14} /> Copy link</>}</button>
        <button className="cb-prev-exit" onClick={() => { setPreviewBooking(false); resetBooking(); }}><X size={15} /> Back to console</button>
      </div>
      {previewDevice === 'phone'
        ? <div className="cb-prev-frame phone"><div className="cb-prev-device">{renderBooking()}</div></div>
        : <div className="cb-prev-frame">{renderBooking()}</div>}
    </>
  );
  if (!currentUser && showBooking) return renderBooking();
  if (!currentUser) {
    const currentAccount = accounts.find((a) => a.id === account) || WHEELY_ACCOUNT;
    return (
      <>
        <style>{CSS}</style><style>{themeCss}</style>
        <div className="cb-login">
          <div className="cb-login-card">
            <div className="cb-login-brand">
              <div className="cb-logo"><BufflyMark size={23} /></div>
              <div><div className="cb-brand-1 dark">User log in</div><div className="cb-brand-2 dark">Buffly</div></div>
            </div>

            {authStep === 'accounts' ? (<>
              <p className="cb-login-hint">Choose a shop to sign into, or start a brand-new one — each shop keeps its own customers, jobs, and settings.</p>
              <div className="cb-profiles">
                {accounts.map((a) => (
                  <div key={a.id} className="cb-acct-row">
                    <button className="cb-profile cb-acct-main" onClick={() => switchAccount(a)}>
                      <div className="cb-avatar admin">{a.initials}</div>
                      <div className="cb-profile-main"><div className="cb-profile-name">{a.shopName}</div><div className="cb-profile-title">{a.id === account ? 'Current workspace' : 'Detailing shop'}</div></div>
                      <ArrowRight size={15} />
                    </button>
                    {a.id !== 'wheely' && <button className="cb-acct-del" title={`Delete ${a.shopName}`} onClick={() => deleteAccount(a)}><Trash2 size={16} /></button>}
                  </div>
                ))}
              </div>
              <button className="cb-bookcta" onClick={() => setAuthStep('newshop')}><Plus size={16} /> Create a new shop account</button>
              <button className="cb-login-switch" onClick={() => setAuthStep('profiles')}>← Back to sign in</button>
            </>) : authStep === 'newshop' ? (<>
              <p className="cb-login-hint">Spin up a fresh Buffly workspace. You'll start with the full feature set and an empty book of business — all your own.</p>
              <div className="cb-newshop">
                <Field label="Shop name"><input className="cb-input" value={newShop.shopName} onChange={(e) => setNewShop({ ...newShop, shopName: e.target.value })} placeholder="e.g. Shine Time Detailing" /></Field>
                <Field label="Your name (owner)"><input className="cb-input" value={newShop.ownerName} onChange={(e) => setNewShop({ ...newShop, ownerName: e.target.value })} placeholder="e.g. Joe Garcia" /></Field>
                <Field label="Email"><input className="cb-input" value={newShop.email} onChange={(e) => setNewShop({ ...newShop, email: e.target.value })} placeholder="you@yourshop.com" /></Field>
              </div>
              <button className="cb-bookcta cb-newshop-go" onClick={createAccount} disabled={!newShop.shopName.trim()}><Check size={16} /> Create shop &amp; sign in</button>
              <button className="cb-login-switch" onClick={() => setAuthStep('accounts')}>← Back</button>
            </>) : (<>
              <p className="cb-login-hint">Signing in to <strong>{currentAccount.shopName}</strong>. Pick a profile — admin sees everything, crew get a focused view.</p>
              <div className="cb-profiles">
                {staff.map((u) => (
                  <button key={u.id} className="cb-profile" onClick={() => { setCurrentUser(u); setView('dashboard'); }}>
                    <div className={`cb-avatar${u.role === 'admin' ? ' admin' : ''}`}>{u.initials}</div>
                    <div className="cb-profile-main"><div className="cb-profile-name">{u.name}</div><div className="cb-profile-title">{u.title}</div></div>
                    {u.role === 'admin' ? <span className="cb-rolebadge admin"><ShieldCheck size={12} /> Admin</span> : <span className="cb-rolebadge">Staff</span>}
                  </button>
                ))}
              </div>
              <button className="cb-login-switch" onClick={() => setAuthStep('accounts')}><RefreshCw size={13} /> Switch shop or create a new account</button>
              <button className="cb-bookcta" onClick={() => { resetBooking(); setShowBooking(true); }}><Car size={16} /> Customer? Book a detail online</button>
            </>)}
            <div className="cb-login-foot">Buffly · {currentAccount.shopName}</div>
          </div>
        </div>
      </>
    );
  }

  /* ------------------------------- shell -------------------------------- */
  return (
    <>
      <style>{CSS}</style><style>{themeCss}</style>
      <div className={`cb-app${settings.themeMode === 'Dark' ? ' cb-dark' : ''}`}>
        <aside className="cb-side">
          <div className="cb-brand">
            <div className="cb-logo"><BufflyMark size={22} /></div>
            <div className="cb-brand-text"><span className="cb-brand-1">Shop console</span><span className="cb-brand-2">Buffly</span></div>
          </div>
          <nav className="cb-nav">
            {allowedNav.map((n) => (
              <button key={n.id} className={`cb-nav-item${view2 === n.id ? ' active' : ''}`} onClick={() => setView(n.id)}>
                <n.icon size={18} strokeWidth={2.1} /><span>{n.label}</span>
              </button>
            ))}
          </nav>
          <div className="cb-side-foot">
            <div className="cb-user">
              <div className={`cb-avatar${role === 'admin' ? ' admin' : ''}`}>{currentUser.initials}</div>
              <div className="cb-user-main"><div className="cb-user-name">{currentUser.name}</div><div className="cb-user-role">{role === 'admin' ? 'Admin access' : 'Staff access'}</div></div>
            </div>
            <button className="cb-reset" onClick={() => { resetBooking(); setPreviewBooking(true); }}><Eye size={13} /> Preview booking page</button>
            <button className="cb-reset" onClick={copyBookingLink}>{linkCopied ? <><Check size={13} /> Link copied</> : <><Copy size={13} /> Copy booking link</>}</button>
            <button className="cb-reset" onClick={() => { setCurrentUser(null); }}><LogOut size={13} /> Switch profile</button>
            <button className="cb-reset ghost" onClick={resetDemo}>Reset demo data</button>
          </div>
        </aside>
        <main className="cb-main">
          <div className="cb-main-inner">
            <ErrorBoundary key={view2}>
              {view2 === 'dashboard' && renderDashboard()}
              {view2 === 'calendar' && renderCalendar()}
              {view2 === 'customers' && renderCustomers()}
              {view2 === 'invoices' && renderInvoicesView()}
              {view2 === 'services' && renderServices()}
              {view2 === 'inventory' && renderInventory()}
              {view2 === 'timeclock' && renderTimeClock()}
              {view2 === 'marketing' && renderMarketing()}
              {view2 === 'preferences' && renderPreferences()}
              {view2 === 'analytics' && renderAnalytics()}
              {view2 === 'winback' && renderWinback()}
              {view2 === 'promotions' && renderPromotions()}
            </ErrorBoundary>
          </div>
        </main>
      </div>

      {/* ---------------- modals ---------------- */}

        </Modal>
      )}

      {modal === 'job' && (
        <Modal title="Schedule a job" sub="Assign to a van or the shop" onClose={() => setModal(null)}
          footer={<><Btn variant="ghost" onClick={() => setModal(null)}>Cancel</Btn><Btn icon={Check} disabled={jobMode === 'new' ? !njcust.name.trim() : !njob.customerId} onClick={saveJob}>Add to schedule</Btn></>}>
          <div className="cb-seg" style={{ marginBottom: 12 }}>
            <button type="button" className={jobMode === 'existing' ? 'on' : ''} onClick={() => setJobMode('existing')}>Existing customer</button>
            <button type="button" className={jobMode === 'new' ? 'on' : ''} onClick={() => setJobMode('new')}>+ New customer</button>
          </div>
          {jobMode === 'existing' ? (<>
            <Field label="Customer"><select className="cb-input" value={njob.customerId} onChange={(e) => { const c = customers.find((x) => x.id === e.target.value); setNjob({ ...njob, customerId: e.target.value, vehicle: c ? vehLabel(allVehicles(c)[0]) : '' }); }}><option value="">Select customer…</option>{customers.map((c) => <option key={c.id} value={c.id}>{c.name} — {c.make} {c.model}</option>)}</select></Field>
            {njob.customerId && (() => { const c = customers.find((x) => x.id === njob.customerId); const vs = c ? allVehicles(c) : []; return vs.length > 1 ? <Field label="Vehicle"><select className="cb-input" value={njob.vehicle} onChange={(e) => setNjob({ ...njob, vehicle: e.target.value })}>{vs.map((v, i) => <option key={i} value={vehLabel(v)}>{vehLabel(v)}</option>)}</select></Field> : null; })()}
          </>) : (<>
            <Field label="Full name"><input className="cb-input" value={njcust.name} onChange={(e) => setNjcust({ ...njcust, name: e.target.value })} placeholder="Jane Doe" /></Field>
            <div className="cb-two">
              <Field label="Phone"><input className="cb-input" value={njcust.phone} onChange={(e) => setNjcust({ ...njcust, phone: e.target.value })} placeholder="973-555-0000" /></Field>
              <Field label="Email"><input className="cb-input" value={njcust.email} onChange={(e) => setNjcust({ ...njcust, email: e.target.value })} placeholder="jane@email.com" /></Field>
            </div>
            <Field label="Address">
              <div className="cb-addr">
                <input className="cb-input" value={njcust.address} autoComplete="off" onChange={(e) => { setNjcust({ ...njcust, address: e.target.value }); queryAddr(e.target.value); }} placeholder="Start typing a street address…" />
                {addrSuggestBox(setNjcust)}
              </div>
            </Field>
            <div className="cb-three">
              <Field label="City"><input className="cb-input" value={njcust.city} onChange={(e) => setNjcust({ ...njcust, city: e.target.value })} placeholder="Morristown" /></Field>
              <Field label="State"><input className="cb-input" value={njcust.state} onChange={(e) => setNjcust({ ...njcust, state: e.target.value })} placeholder="NJ" /></Field>
              <Field label="Zip"><input className="cb-input" value={njcust.zip} onChange={(e) => setNjcust({ ...njcust, zip: e.target.value })} placeholder="07960" /></Field>
            </div>
            <div className="cb-three">
              <Field label="Year"><input className="cb-input" value={njcust.year} onChange={(e) => setNjcust({ ...njcust, year: e.target.value })} placeholder="2022" /></Field>
              <Field label="Make"><input className="cb-input" value={njcust.make} onChange={(e) => setNjcust({ ...njcust, make: e.target.value })} placeholder="BMW" /></Field>
              <Field label="Model"><input className="cb-input" value={njcust.model} onChange={(e) => setNjcust({ ...njcust, model: e.target.value })} placeholder="X5" /></Field>
            </div>
            <div className="cb-note">This adds them to your customer list too.</div>
          </>)}
          <Field label="Service"><select className="cb-input" value={njob.service} onChange={(e) => setNjob({ ...njob, service: e.target.value })}>{services.map((s) => <option key={s.id}>{s.name}</option>)}</select></Field>
          {(() => { const svc = services.find((s) => s.name === njob.service); return svc && svc.sizes ? (
            <Field label="Vehicle size"><select className="cb-input" value={njob.sizeKey} onChange={(e) => setNjob({ ...njob, sizeKey: e.target.value })}>{VEHICLE_SIZES.map((v) => <option key={v.k} value={v.k}>{v.label} — {money(priceFor(svc, v.k))}</option>)}</select></Field>
          ) : null; })()}
          <Field label="Add-ons">
            <div className="cb-job-addons">
              {addons.map((a) => { const on = (njob.addons || []).includes(a.id); return (
                <button type="button" key={a.id} className={`cb-addchip${on ? ' on' : ''}`} onClick={() => setNjob((p) => ({ ...p, addons: on ? (p.addons || []).filter((x) => x !== a.id) : [...(p.addons || []), a.id] }))}>{a.name} <span>+{money(a.price)}</span></button>
              ); })}
            </div>
          </Field>
          {(() => { const svc = services.find((s) => s.name === njob.service); const items = (njob.addons || []).map((id) => addons.find((a) => a.id === id)).filter(Boolean); const price = (svc ? priceFor(svc, njob.sizeKey) : 0) + items.reduce((s, a) => s + a.price, 0); return <div className="cb-note">Estimate: <strong>{money(price)}</strong> — starts at; final price confirmed at the vehicle.</div>; })()}
          <div className="cb-three">
            <Field label="Date"><input type="date" className="cb-input" value={njob.date} onChange={(e) => setNjob({ ...njob, date: e.target.value })} /></Field>
            <Field label="Time"><select className="cb-input" value={njob.time} onChange={(e) => setNjob({ ...njob, time: e.target.value })}>{TIMES.map((t) => <option key={t.label}>{t.label}</option>)}</select></Field>
            <Field label="Resource"><select className="cb-input" value={njob.resource} onChange={(e) => setNjob({ ...njob, resource: e.target.value })}>{RESOURCES.filter((r) => activeResources.includes(r) || r === njob.resource).map((r) => <option key={r} value={r}>{resLabel(r)}</option>)}</select></Field>
          </div>
          <div className="cb-two">
            <Field label="Crew (assign one or more)"><div className="cb-crewpick">{CREW.map((m) => { const on = crewArr(njob).includes(m); return <button key={m} type="button" className={`cb-crewchip${on ? ' on' : ''}`} onClick={() => setNjob((p) => { const cur = crewArr(p); return { ...p, crew: cur.includes(m) ? cur.filter((x) => x !== m) : [...cur, m] }; })}>{on && <Check size={12} strokeWidth={3} />} {m}</button>; })}</div></Field>
            <Field label="Status"><select className="cb-input" value={njob.status} onChange={(e) => setNjob({ ...njob, status: e.target.value })}>{Object.keys(JOB_STATUS).map((s) => <option key={s}>{s}</option>)}</select></Field>
          </div>
          <CardFields vals={njob} patch={(pp) => setNjob({ ...njob, ...pp })} current={jobMode === 'existing' && njob.customerId ? (customers.find((c) => c.id === njob.customerId) || {}).card : null} />
        </Modal>
      )}

      {modal === 'quote' && (
        <Modal title="Create quote" sub="Build from your service menu" onClose={() => setModal(null)} wide
          footer={<><div className="cb-quote-total">Total <strong>{money(quoteTotal)}</strong></div><Btn variant="ghost" onClick={() => setModal(null)}>Cancel</Btn><Btn icon={Check} onClick={saveQuote}>Save quote</Btn></>}>
          <Field label="Customer"><select className="cb-input" value={nquote.customerId} onChange={(e) => setNquote({ ...nquote, customerId: e.target.value })}><option value="">Select customer…</option>{customers.map((c) => <option key={c.id} value={c.id}>{c.name} — {c.make} {c.model}</option>)}</select></Field>
          <div className="cb-line-add">
            <select className="cb-input" value={nquote.pending} onChange={(e) => setNquote({ ...nquote, pending: e.target.value })}><optgroup label="Services">{services.map((s) => <option key={s.id} value={s.id}>{s.name} — from {money(startPrice(s))}</option>)}</optgroup><optgroup label="Add-ons">{addons.map((a) => <option key={a.id} value={a.id}>{a.name} — {money(a.price)}</option>)}</optgroup></select>
            <Btn variant="subtle" icon={Plus} onClick={addLine}>Add line</Btn>
          </div>
          <div className="cb-lines">
            {nquote.items.length === 0 ? <div className="cb-empty cb-empty-sm">No services added yet.</div> :
              nquote.items.map((i) => <div key={i.id} className="cb-line"><span>{i.name}</span><span className="cb-line-price">{money(i.price)}</span><button className="cb-icon-btn cb-icon-sm" onClick={() => removeLine(i.id)} aria-label="Remove"><Trash2 size={15} /></button></div>)}
          </div>
        </Modal>
      )}

      {modal === 'addItem' && (
        <Modal title="Add inventory item" onClose={() => setModal(null)}
          footer={<><Btn variant="ghost" onClick={() => setModal(null)}>Cancel</Btn><Btn icon={Check} onClick={saveItem}>Add item</Btn></>}>
          <Field label="Item name"><input className="cb-input" value={nitem.name} onChange={(e) => setNitem({ ...nitem, name: e.target.value })} placeholder="Glass cleaner" /></Field>
          <div className="cb-two">
            <Field label="Category"><input className="cb-input" value={nitem.category} onChange={(e) => setNitem({ ...nitem, category: e.target.value })} placeholder="Interior" /></Field>
            <Field label="Unit"><select className="cb-input" value={nitem.unit} onChange={(e) => setNitem({ ...nitem, unit: e.target.value })}>{['bottle', 'gal', 'pack', 'kit', 'box', 'each'].map((u) => <option key={u}>{u}</option>)}</select></Field>
          </div>
          <div className="cb-two">
            <Field label="On hand"><input type="number" className="cb-input" value={nitem.qty} onChange={(e) => setNitem({ ...nitem, qty: e.target.value })} /></Field>
            <Field label="Par (reorder at)"><input type="number" className="cb-input" value={nitem.par} onChange={(e) => setNitem({ ...nitem, par: e.target.value })} /></Field>
          </div>
        </Modal>
      )}

      {modal === 'service' && nsvc && (
        <Modal title={nsvc.id ? 'Edit service' : 'Add service'} sub="Shows on your booking page and quote builder" onClose={() => setModal(null)} wide
          footer={<><Btn variant="ghost" onClick={() => setModal(null)}>Cancel</Btn><Btn icon={Check} onClick={saveService}>{nsvc.id ? 'Save changes' : 'Add service'}</Btn></>}>
          <Field label="Service name"><input className="cb-input" value={nsvc.name} onChange={(e) => setNsvc({ ...nsvc, name: e.target.value })} placeholder="e.g. Wheely Express" /></Field>
          <div className="cb-two">
            <Field label="Category"><select className="cb-input" value={nsvc.cat} onChange={(e) => setNsvc({ ...nsvc, cat: e.target.value })}>{['Detailing', 'Paint', 'Ceramic', 'Restoration', 'Marine', 'Add Service'].map((c) => <option key={c}>{c}</option>)}</select></Field>
            <Field label="Duration (minutes)"><input className="cb-input" type="number" value={nsvc.dur} onChange={(e) => setNsvc({ ...nsvc, dur: e.target.value })} /></Field>
          </div>
          <Field label="Short description"><textarea className="cb-input" rows={2} value={nsvc.blurb} onChange={(e) => setNsvc({ ...nsvc, blurb: e.target.value })} placeholder="What's included…" /></Field>
          <Field label="Pricing">
            <div className="cb-seg-toggle">
              <button className={nsvc.mode === 'flat' ? 'on' : ''} onClick={() => setNsvc({ ...nsvc, mode: 'flat' })}>Flat price</button>
              <button className={nsvc.mode === 'sizes' ? 'on' : ''} onClick={() => setNsvc({ ...nsvc, mode: 'sizes' })}>By vehicle size</button>
            </div>
          </Field>
          {nsvc.mode === 'flat' ? (
            <Field label="Price ($)"><input className="cb-input" type="number" value={nsvc.price} onChange={(e) => setNsvc({ ...nsvc, price: e.target.value })} /></Field>
          ) : (
            <div className="cb-sizegrid">
              {VEHICLE_SIZES.map((v) => (
                <label key={v.k} className="cb-sizecell"><span>{v.label}</span><input className="cb-input" type="number" value={nsvc.sizes[v.k]} onChange={(e) => setNsvc({ ...nsvc, sizes: { ...nsvc.sizes, [v.k]: e.target.value } })} /></label>
              ))}
            </div>
          )}
          <label className="cb-check"><input type="checkbox" checked={nsvc.shopOnly} onChange={(e) => setNsvc({ ...nsvc, shopOnly: e.target.checked })} /> <span>Shop only — not offered as a mobile service</span></label>
        </Modal>
      )}

      {modal === 'addon' && nadd && (
        <Modal title={nadd.id ? 'Edit add-on' : 'Add add-on'} sub="Optional extras customers can tack on" onClose={() => setModal(null)}
          footer={<><Btn variant="ghost" onClick={() => setModal(null)}>Cancel</Btn><Btn icon={Check} onClick={saveAddon}>{nadd.id ? 'Save changes' : 'Add add-on'}</Btn></>}>
          <Field label="Add-on name"><input className="cb-input" value={nadd.name} onChange={(e) => setNadd({ ...nadd, name: e.target.value })} placeholder="e.g. Pet Hair Removal" /></Field>
          <Field label="Price ($)"><input className="cb-input" type="number" value={nadd.price} onChange={(e) => setNadd({ ...nadd, price: e.target.value })} /></Field>
        </Modal>
      )}

      {modal === 'import' && (
        <Modal title="Import customers" sub={importRows.length ? `${importRows.length} contact${importRows.length === 1 ? '' : 's'} found in your file` : 'Check your file'} onClose={() => { setModal(null); setImportRows([]); }}
          footer={<><Btn variant="ghost" onClick={() => { setModal(null); setImportRows([]); }}>Cancel</Btn><Btn icon={Check} disabled={!importRows.length} onClick={doImport}>Import {importRows.length || ''}</Btn></>}>
          {importRows.length === 0 ? (
            <div className="cb-book-note">We couldn't read any contacts. Make sure the first row has column headers — we recognize <strong>name</strong> (or first/last), <strong>phone</strong>, <strong>email</strong>, <strong>address</strong>, <strong>town/city</strong>, and either a single <strong>vehicle</strong> column or separate <strong>year / make / model</strong> columns.</div>
          ) : (<>
            <div className="cb-book-note">Columns were matched automatically and vehicles parsed. Preview of the first {Math.min(5, importRows.length)}:</div>
            <div className="cb-imp-prev">
              {importRows.slice(0, 5).map((c, i) => (
                <div key={i} className="cb-imp-row">
                  <div className="cb-imp-name">{c.name || '—'}</div>
                  <div className="cb-imp-meta">{[c.phone, c.email, [c.year, c.make, c.model].filter(Boolean).join(' ')].filter(Boolean).join(' · ') || 'no extra details'}</div>
                </div>
              ))}
              {importRows.length > 5 && <div className="cb-imp-more">+ {importRows.length - 5} more</div>}
            </div>
            <div className="cb-book-note" style={{ marginTop: 12 }}>They'll be added to your customer list as <strong>Repeat Clients</strong> (source “Import”). Existing customers aren't changed.</div>
          </>)}
        </Modal>
      )}

      {modal === 'staff' && nstaff && (
        <Modal title={nstaff.id ? 'Edit employee' : 'Add employee'} sub="They'll appear on the sign-in screen with the access you choose" onClose={() => { setModal(null); setNstaff(null); }}
          footer={<><Btn variant="ghost" onClick={() => { setModal(null); setNstaff(null); }}>Cancel</Btn><Btn icon={Check} onClick={saveStaff}>{nstaff.id ? 'Save changes' : 'Add employee'}</Btn></>}>
          <div className="cb-two">
            <Field label="Name"><input className="cb-input" value={nstaff.name} onChange={(e) => setNstaff({ ...nstaff, name: e.target.value })} placeholder="Jordan B." /></Field>
            <Field label="Job title"><input className="cb-input" value={nstaff.title} onChange={(e) => setNstaff({ ...nstaff, title: e.target.value })} placeholder="Detailer" /></Field>
          </div>
          <Field label="Initials (shown on avatar)"><input className="cb-input" maxLength={3} value={nstaff.initials} onChange={(e) => setNstaff({ ...nstaff, initials: e.target.value })} placeholder={nstaff.name ? initialsOf(nstaff.name) : 'JB'} /></Field>
          <Field label="Access level">
            <div className="cb-seg-toggle">
              <button className={nstaff.role === 'admin' ? 'on' : ''} onClick={() => setNstaff({ ...nstaff, role: 'admin' })}>Admin — full access</button>
              <button className={nstaff.role === 'staff' ? 'on' : ''} onClick={() => setNstaff({ ...nstaff, role: 'staff' })}>Detailer — limited</button>
            </div>
          </Field>
          <div className="cb-book-note">Admins see everything (pricing, invoices, marketing, preferences). Detailers get the crew view — calendar, customers, inventory, and time clock.</div>
        </Modal>
      )}

      {modal === 'compose' && (
        <Modal title={comp.channel === 'email' ? 'New email campaign' : 'New SMS blast'} sub={`To ${segCount(comp.audience, customers)} ${comp.audience.toLowerCase()}`} onClose={() => setModal(null)} wide
          footer={<><Btn variant="ghost" disabled={!comp.name.trim()} onClick={() => saveCampaign('Draft')}>Save draft</Btn><Btn variant="primary" icon={Send} disabled={!comp.name.trim() || !comp.body.trim()} onClick={() => saveCampaign('Sent')}>Send to {segCount(comp.audience, customers)}</Btn></>}>
          {settings.aiOn && (
            <div className="cb-ai-panel">
              <div className="cb-ai-h"><Sparkles size={15} /> Draft with Wheely AI</div>
              <div className="cb-ai-row">
                <input className="cb-input" value={aiBrief} onChange={(e) => setAiBrief(e.target.value)} placeholder={comp.channel === 'email' ? "What's this about? e.g. 'Father's Day, $40 off'" : "e.g. 'win back customers, 15% off'"} onKeyDown={(e) => { if (e.key === 'Enter') aiGenerate(); }} />
                <Btn icon={Sparkles} onClick={aiGenerate}>Generate</Btn>
              </div>
              <div className="cb-ai-chips">
                {['Father\u2019s Day promo', 'Review request', 'Win back old customers', 'Ceramic coating', 'Winter prep, $30 off'].map((c) => (
                  <button key={c} className="cb-ai-chip" onClick={() => { setAiBrief(c); const out = aiCopy(comp.channel, c, comp.audience, settings.aiTone); setComp((p) => ({ ...p, subject: out.subject || p.subject, body: out.body, name: p.name || c })); }}>{c}</button>
                ))}
              </div>
            </div>
          )}
          <div className="cb-two">
            <Field label="Campaign name"><input className="cb-input" value={comp.name} onChange={(e) => setComp({ ...comp, name: e.target.value })} placeholder={comp.channel === 'email' ? 'June newsletter' : 'Weekend promo'} /></Field>
            <Field label="Audience"><select className="cb-input" value={comp.audience} onChange={(e) => setComp({ ...comp, audience: e.target.value })}>{SEGMENTS.map((s) => <option key={s} value={s}>{s} ({segCount(s, customers)})</option>)}</select></Field>
          </div>
          {comp.channel === 'email' && <Field label="Subject line"><input className="cb-input" value={comp.subject} onChange={(e) => setComp({ ...comp, subject: e.target.value })} placeholder="Treat your car this weekend" /></Field>}
          <div className="cb-tmpl-row">
            <span className="cb-tmpl-label">Quick start:</span>
            {(comp.channel === 'email' ? EMAIL_TEMPLATES : SMS_TEMPLATES).map((t) => <button key={t.k} className="cb-tmpl" onClick={() => applyTemplate(t)}>{t.k}</button>)}
          </div>
          <Field label={comp.channel === 'email' ? 'Message' : 'Text message'}><textarea className="cb-input cb-area cb-area-lg" value={comp.body} onChange={(e) => setComp({ ...comp, body: e.target.value })} placeholder="Write your message…" /></Field>
          {comp.channel === 'sms' && <div className="cb-charcount">{comp.body.length} characters · ~{Math.max(1, Math.ceil(comp.body.length / 160))} segment(s)</div>}
          {(!comp.name.trim() || !comp.body.trim()) && <div className="cb-charcount" style={{ marginTop: 8 }}>Add a campaign name{!comp.body.trim() ? ' and a message' : ''} to send. (Or press Esc / × to close.)</div>}
        </Modal>
      )}
    </>
  );

  /* renderInvoicesView declared after return via hoisting is not allowed for const,
     so define it as a function declaration below */
  function renderInvoicesView() {
    const list = docTab === 'quotes' ? quotes : invoices;
    return (
      <>
        <div className="cb-page-head">
          <div><div className="cb-eyebrow">Money</div><h1 className="cb-h1">Quotes &amp; Invoices</h1></div>
          <Btn icon={Plus} onClick={() => startQuoteFor('')}>Create quote</Btn>
        </div>
        <div className="cb-tabs">
          <button className={`cb-tab${docTab === 'quotes' ? ' active' : ''}`} onClick={() => setDocTab('quotes')}>Quotes <span className="cb-tab-n">{quotes.length}</span></button>
          <button className={`cb-tab${docTab === 'invoices' ? ' active' : ''}`} onClick={() => setDocTab('invoices')}>Invoices <span className="cb-tab-n">{invoices.length}</span></button>
        </div>
        <section className="cb-card cb-card-flush">
          {list.length === 0 ? <div className="cb-empty">No {docTab} yet. <button className="cb-link" onClick={() => startQuoteFor('')}>Create one →</button></div> :
            list.map((d) => (
              <div key={d.id} className="cb-drow">
                <div className="cb-drow-main"><div className="cb-row-title">{d.name}</div><div className="cb-row-sub">{d.items.map((i) => i.name).join(' · ')}</div><div className="cb-row-meta">{niceDate(d.date)}</div></div>
                <div className="cb-drow-amt">{money(d.total)}</div>
                <Chip map={DOC_STATUS} value={d.status} />
                <div className="cb-drow-action">
                  {docTab === 'quotes' && canEditJobs && <Btn variant="ghost" icon={CalendarDays} onClick={() => bookFromQuote(d)}>Book</Btn>}
                  {docTab === 'quotes' && d.status !== 'Accepted' && <Btn variant="subtle" icon={ArrowRight} onClick={() => convertQuote(d)}>Convert</Btn>}
                  {docTab === 'quotes' && d.status === 'Accepted' && <span className="cb-done"><Check size={14} /> Invoiced</span>}
                  {docTab === 'invoices' && d.status === 'Unpaid' && <Btn variant="blue" icon={Check} onClick={() => markPaid(d)}>Mark paid</Btn>}
                  {docTab === 'invoices' && d.status === 'Paid' && <span className="cb-done"><Check size={14} /> Paid</span>}
                </div>
              </div>
            ))}
        </section>
      </>
    );
  }
}

/* --- service menu manager --- */
.cb-icon-btn.cb-danger:hover{ color:#B42318; background:#FDECEC; }
.cb-tagmini{ display:inline-block; margin-left:8px; font-size:10.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; color:#B45309; background:#FEF1DC; padding:2px 7px; border-radius:999px; vertical-align:middle; }
.cb-sizegrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
.cb-sizecell{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.cb-sizecell span{ font-size:13px; color:#475569; font-weight:600; }
.cb-sizecell .cb-input{ max-width:110px; text-align:right; }
.cb-check{ display:flex; align-items:center; gap:9px; margin-top:14px; font-size:13.5px; font-weight:600; color:#334155; cursor:pointer; }
.cb-check input{ width:17px; height:17px; accent-color:#F26A1B; }
.cb-menu-note{ font-size:12.5px; color:#5E6E80; margin-top:14px; }

:root{
  --bg:#EEF2F7; --surface:#FFFFFF; --surface-2:#F5F8FB; --navy:#0E2A47; --blue:#2F6BD8; --blue-soft:#E7EFFB;
  --orange:#F26A1B; --orange-2:#C75412; --orange-soft:#FDE9DC; --ink:#15293F; --muted:#647688; --line:#E4EAF1; --green:#1E9E5A; --bead:#16B8A6;
  --sidebar:#0E2A47; --bk:#1577D9;
}
.cb-app.cb-dark{
  --bg:#0c1117; --surface:#151c26; --surface-2:#1b2430; --ink:#e8eef6; --muted:#9fb0c3; --line:#27313f; --blue-soft:#16233a; --orange-soft:#2a1d14;
}
.cb-app.cb-dark .cb-card,.cb-app.cb-dark section.cb-card{background:var(--surface); border-color:var(--line);}
.cb-app.cb-dark .cb-input,.cb-app.cb-dark .cb-input:focus{background:var(--surface-2); border-color:var(--line); color:var(--ink);}
.cb-app.cb-dark .cb-topbar,.cb-app.cb-dark .cb-main{background:var(--bg);}
.cb-app.cb-dark .cb-btn-ghost{background:var(--surface-2); color:var(--ink); border-color:var(--line);}
.cb-app.cb-dark .cb-btn-ghost:hover{background:var(--surface);}
.cb-app.cb-dark .cb-icon-btn{background:var(--surface-2); color:var(--ink);}
.cb-app.cb-dark .cb-icon-btn:hover{background:var(--surface);}
.cb-app.cb-dark .cb-tab.active{background:var(--surface); color:var(--ink);}
.cb-app.cb-dark .cb-seg{background:var(--surface);}
.cb-app.cb-dark .cb-seg-toggle button.on{background:var(--surface); color:var(--ink);}
.cb-app.cb-dark .cb-seg-toggle{background:var(--surface-2);}
*{box-sizing:border-box}
.cb-app{display:flex; min-height:100vh; background:var(--bg);
  font-family:'Fredoka',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;}
.cb-app *,.cb-login *{font-variant-numeric:tabular-nums}

/* login */
.cb-login{min-height:100vh; padding:24px; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(1100px 560px at 75% -10%, #1B4470 0%, #0E2A47 58%);
  font-family:'Fredoka',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink);}
.cb-login-card{background:#fff; border-radius:22px; width:100%; max-width:430px; padding:28px 26px; box-shadow:0 30px 80px rgba(0,0,0,.34);}
.cb-login-brand{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.cb-login-hint{font-size:13.5px; color:var(--muted); line-height:1.5; margin:0 0 18px;}
.cb-profiles{display:flex; flex-direction:column; gap:8px;}
.cb-profile{display:flex; align-items:center; gap:12px; padding:11px 12px; border:1px solid var(--line); border-radius:12px;
  background:#fff; cursor:pointer; text-align:left; transition:.15s;}
.cb-profile:hover{border-color:var(--blue); background:#F7FAFF; transform:translateY(-1px);}
.cb-profile-main{flex:1; min-width:0;}
.cb-profile-name{font-size:14.5px; font-weight:750;}
.cb-profile-title{font-size:12.5px; color:var(--muted);}
.cb-login-foot{margin-top:18px; text-align:center; font-size:12px; color:var(--muted);}
.cb-rolebadge{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800; padding:4px 9px; border-radius:999px; background:#EEF2F7; color:var(--muted);}
.cb-rolebadge.admin{background:var(--orange-soft); color:#C2570F;}

/* spine */
.cb-side{width:248px; flex-shrink:0; background:var(--sidebar); color:#fff; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
.cb-brand{display:flex; align-items:center; gap:11px; padding:22px 20px 18px;}
.cb-logo{position:relative; width:38px; height:38px; border-radius:10px; background:var(--orange); display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0;}
.cb-logo-drop{position:absolute; bottom:-3px; right:-3px; width:16px; height:16px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; border:2px solid #fff;}
.cb-brand-text{display:flex; flex-direction:column; line-height:1.05;}
.cb-brand-1{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#9DB4CE; font-weight:600;}
.cb-brand-2{font-family:'Fredoka',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:21px; font-weight:600; letter-spacing:-.01em;}
.cb-brand-1.dark{color:var(--muted);} .cb-brand-2.dark{color:var(--ink); font-size:22px;}
.cb-nav{display:flex; flex-direction:column; gap:2px; padding:8px 12px; flex:1; overflow:auto;}
.cb-nav-item{position:relative; display:flex; align-items:center; gap:12px; width:100%; border:0; cursor:pointer; background:transparent;
  color:#AFC2D8; font-size:14.5px; font-weight:600; padding:11px 12px; border-radius:9px; text-align:left; transition:background .15s,color .15s;}
.cb-nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
.cb-nav-item.active{background:rgba(255,255,255,.10); color:#fff;}
.cb-nav-item.active::before{content:""; position:absolute; left:-12px; top:8px; bottom:8px; width:4px; border-radius:0 4px 4px 0; background:var(--orange);}
.cb-side-foot{padding:14px 16px; border-top:1px solid rgba(255,255,255,.08);}
.cb-user{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.cb-user-main{min-width:0;}
.cb-user-name{font-size:13.5px; font-weight:750; color:#fff;}
.cb-user-role{font-size:11.5px; color:#9DB4CE;}
.cb-reset{display:flex; align-items:center; justify-content:center; gap:6px; background:transparent; border:1px solid rgba(255,255,255,.18); color:#CFE0F0;
  font-size:12px; font-weight:650; padding:8px 10px; border-radius:8px; cursor:pointer; width:100%; transition:.15s; margin-bottom:6px;}
.cb-reset:hover{background:rgba(255,255,255,.08); color:#fff;}
.cb-reset.ghost{border-color:transparent; color:#7E93AB;}
.cb-reset.ghost:hover{color:#CFE0F0; background:rgba(255,255,255,.05);}

/* main */
.cb-main{flex:1; min-width:0;}
.cb-main-inner{max-width:1080px; padding:30px 36px 60px;}
.cb-eyebrow{font-size:11.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px;}
.cb-h1{font-size:27px; font-weight:800; letter-spacing:-.02em; margin:0 0 22px;}
.cb-h2{font-size:15.5px; font-weight:700; margin:0; letter-spacing:-.01em;}
.cb-page-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px;}
.cb-page-head .cb-h1{margin-bottom:18px;}

/* buttons */
.cb-btn{display:inline-flex; align-items:center; gap:7px; border:1px solid transparent; cursor:pointer; font-size:14px; font-weight:650; padding:9px 14px; border-radius:9px; transition:filter .15s,background .15s; white-space:nowrap;}
.cb-btn-primary{background:var(--orange); color:#fff;} .cb-btn-primary:hover{filter:brightness(.94);}
.cb-btn-blue{background:var(--blue); color:#fff;} .cb-btn-blue:hover{filter:brightness(.94);}
.cb-btn-ghost{background:#fff; color:var(--ink); border-color:var(--line);} .cb-btn-ghost:hover{background:#F7FAFD;}
.cb-btn-subtle{background:var(--blue-soft); color:var(--blue);} .cb-btn-subtle:hover{filter:brightness(.97);}
.cb-full{width:100%; justify-content:center;}
.cb-icon-btn{background:#fff; border:1px solid var(--line); width:34px; height:34px; border-radius:9px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; color:var(--ink); transition:.15s;}
.cb-icon-btn:hover{background:#F2F6FB;}
.cb-icon-sm{width:30px; height:30px; color:var(--muted);}
.cb-link{background:none; border:0; color:var(--blue); font-weight:650; cursor:pointer; font-size:13.5px; padding:0;}
.cb-link:hover{text-decoration:underline;}

/* chips */
.cb-chip{display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; white-space:nowrap;}

/* stats + alerts */
.cb-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px;}
.cb-stat{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; display:flex; align-items:center; gap:13px;}
.cb-stat-ico{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.cb-stat-val{font-size:22px; font-weight:800; letter-spacing:-.02em; line-height:1;}
.cb-stat-lbl{font-size:12.5px; color:var(--muted); font-weight:600; margin-top:3px;}
.cb-alert-row{display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.cb-alert{display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); border-radius:11px; padding:10px 14px; font-size:13.5px; font-weight:650; cursor:pointer; color:var(--ink); transition:.15s;}
.cb-alert:hover{border-color:#C9D6E5;}
.cb-alert.warn{border-color:#F3D9B0; background:#FFFBF4;}
.cb-alert-ico{width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.cb-alert-ico.ok{background:var(--blue-soft); color:var(--blue);}
.cb-alert-ico.bad{background:var(--orange-soft); color:#D2570F;}

/* cards/rows */
.cb-grid2{display:grid; grid-template-columns:1.5fr 1fr; gap:18px; align-items:start;}
.cb-stack{display:flex; flex-direction:column; gap:18px;}
.cb-card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px;}
.cb-card-flush{padding:6px 0;}
.cb-card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.cb-row{display:flex; align-items:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--line);}
.cb-card:not(.cb-card-flush) .cb-row{padding:12px 0;}
.cb-row:last-child{border-bottom:0;}
.cb-row-tight{padding:10px 18px;}
.cb-card:not(.cb-card-flush) .cb-row-tight{padding:10px 0;}
.cb-row-time{font-size:13px; font-weight:700; color:var(--blue); width:64px; flex-shrink:0;}
.cb-row-main{flex:1; min-width:0;}
.cb-row-title{font-size:14.5px; font-weight:700; letter-spacing:-.01em;}
.cb-row-sub{font-size:12.5px; color:var(--muted); font-weight:500; margin-top:2px; display:flex; align-items:center; gap:4px; flex-wrap:wrap;}
.cb-amt{font-weight:800; font-size:14px;}
.cb-out{font-size:12px; font-weight:700; color:var(--orange);}
.cb-pipe{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line);}
.cb-pipe:last-child{border-bottom:0;}
.cb-pipe-n{font-weight:800; font-size:15px;}
.cb-empty{padding:26px 18px; color:var(--muted); font-size:14px; text-align:center;}
.cb-empty-sm{padding:16px; font-size:13px;}

/* customers */
.cb-toolbar{margin-bottom:12px;}
.cb-search{display:flex; align-items:center; gap:9px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:0 13px; max-width:420px; color:var(--muted);}
.cb-search input{border:0; outline:0; padding:11px 0; font-size:14px; width:100%; background:transparent; color:var(--ink);}
.cb-filters{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
.cb-pill{background:#fff; border:1px solid var(--line); color:var(--muted); font-size:13px; font-weight:650; padding:7px 13px; border-radius:999px; cursor:pointer; transition:.15s;}
.cb-pill:hover{border-color:#C9D6E5;} .cb-pill.active{background:var(--navy); border-color:var(--navy); color:#fff;}
.cb-crow{display:flex; align-items:center; gap:14px; width:100%; border:0; background:transparent; cursor:pointer; padding:13px 18px; border-bottom:1px solid var(--line); text-align:left; transition:background .12s;}
.cb-crow:last-child{border-bottom:0;} .cb-crow:hover{background:#F7FAFD;}
.cb-avatar{width:38px; height:38px; border-radius:10px; background:var(--blue-soft); color:var(--blue); font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.cb-avatar.admin{background:var(--orange-soft); color:#C2570F;}
.cb-avatar.sm{width:34px; height:34px; font-size:12px;}
.cb-crow-main{flex:1; min-width:0;}
.cb-crow-meta{display:flex; align-items:center; gap:16px;}
.cb-crow-ltv{font-weight:800; font-size:13.5px; width:64px; text-align:right;}
.cb-crow-arrow{color:#B6C4D6; flex-shrink:0;}

/* calendar */
.cb-cal-head{display:flex; align-items:center; justify-content:center; gap:22px; margin-bottom:18px;}
.cb-cal-title{font-size:22px; font-weight:800; min-width:230px; text-align:center;}
.cb-cal-dow{display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:10px;}
.cb-cal-dow span{text-align:center; font-size:13px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--muted);}
.cb-cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px;}
.cb-cal-cell{min-height:132px; border:1px solid var(--line); border-radius:13px; background:#fff; padding:12px; cursor:pointer; display:flex; flex-direction:column; align-items:flex-start; gap:8px; transition:.13s;}
.cb-cal-cell:hover{border-color:var(--blue); background:#F7FAFF;}
.cb-cal-cell.empty{border:0; background:transparent; cursor:default;}
.cb-cal-cell.today{border-color:var(--orange); box-shadow:inset 0 0 0 2px var(--orange);}
.cb-cal-cell.sel{background:var(--blue-soft);}
.cb-cal-num{font-size:18px; font-weight:800;}
.cb-cal-badge{font-size:13.5px; font-weight:700; color:var(--blue); background:var(--blue-soft); border-radius:8px; padding:4px 10px;}
.cb-cal-cell.today .cb-cal-num{color:var(--orange);}

/* schedule day */
.cb-daynav{display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap;}
.cb-daynav-label{font-size:20px; font-weight:800;}
.cb-lanes{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; align-items:start;}
.cb-lane{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px; min-height:220px;}
.cb-lane-head{display:flex; align-items:center; justify-content:space-between; font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--navy); padding:4px 6px 12px; border-bottom:1px solid var(--line); margin-bottom:12px;}
.cb-lane-count{background:var(--blue-soft); color:var(--blue); border-radius:999px; padding:2px 10px; font-size:13px;}
.cb-lane-empty{padding:18px; text-align:center; font-size:13.5px;}
.cb-jobcard{background:#FBFCFE; border:1px solid var(--line); border-left:4px solid var(--orange); border-radius:12px; padding:14px 15px; margin-bottom:11px; cursor:pointer; transition:background .12s, box-shadow .12s;}
.cb-jobcard:hover{background:#F3F7FC; box-shadow:0 2px 8px rgba(16,35,56,.06);}
.cb-jobcard-maps{display:inline-flex; align-items:center; gap:6px; margin-top:11px; background:#fff; border:1px solid var(--line); color:var(--blue); font-size:13px; font-weight:750; border-radius:9px; padding:7px 12px; cursor:pointer; transition:.12s;}
.cb-jobcard-maps:hover{border-color:var(--blue); background:#EFF5FE;}
.cb-jobcard:last-child{margin-bottom:0;}
.cb-jobcard-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;}
.cb-jobcard-time{font-size:13.5px; font-weight:700; color:var(--muted); display:flex; align-items:center; gap:5px;}
.cb-jobcard-name{font-size:16.5px; font-weight:800;}
.cb-jobcard-svc{font-size:14px; margin-top:3px;}
.cb-jobcard-crew{font-size:13.5px; color:var(--muted); margin-top:6px;}

/* docs + marketing rows */
.cb-tabs{display:flex; gap:4px; background:#E9EFF6; padding:4px; border-radius:11px; width:fit-content; margin-bottom:16px;}
.cb-tab{border:0; background:transparent; font-size:13.5px; font-weight:700; color:var(--muted); padding:8px 16px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:7px; transition:.15s;}
.cb-tab.active{background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(16,35,56,.08);}
.cb-tab-n{background:#D9E3EF; color:var(--muted); border-radius:999px; font-size:11px; padding:1px 7px;}
.cb-tab.active .cb-tab-n{background:var(--blue-soft); color:var(--blue);}
.cb-drow{display:flex; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--line);}
.cb-drow:last-child{border-bottom:0;}
.cb-drow-main{flex:1; min-width:0;}
.cb-row-meta{font-size:12px; color:var(--muted); margin-top:3px;}
.cb-drow-amt{font-weight:800; font-size:15px; width:74px; text-align:right;}
.cb-drow-action{width:150px; display:flex; justify-content:flex-end;}
.cb-done{display:inline-flex; align-items:center; gap:5px; color:var(--green); font-weight:700; font-size:13px;}
.cb-chan-ico{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

/* inventory */
.cb-warnbar{display:flex; align-items:center; gap:8px; background:#FFFBF4; border:1px solid #F3D9B0; color:#9A5B07; font-size:13.5px; font-weight:650; padding:11px 14px; border-radius:11px; margin-bottom:14px;}
.cb-inv-row{display:flex; align-items:center; gap:14px; padding:13px 18px; border-bottom:1px solid var(--line);}
.cb-inv-row:last-child{border-bottom:0;}
.cb-inv-main{flex:1; min-width:0;}
.cb-low{display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:800; color:#C2570F; background:var(--orange-soft); padding:3px 9px; border-radius:999px;}
.cb-ok{font-size:12px; font-weight:700; color:var(--green); background:#E4F6EC; padding:3px 9px; border-radius:999px;}
.cb-stepper{display:flex; align-items:center; gap:0; border:1px solid var(--line); border-radius:9px; overflow:hidden;}
.cb-stepper button{width:34px; height:34px; border:0; background:#fff; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center; transition:.13s;}
.cb-stepper button:hover{background:#F2F6FB;}
.cb-stepper button:disabled{color:#C7D2DE; cursor:not-allowed;}
.cb-stepper-val{min-width:64px; text-align:center; font-weight:800; font-size:14px; border-left:1px solid var(--line); border-right:1px solid var(--line); padding:7px 4px;}
.cb-stepper-val small{font-weight:600; color:var(--muted); font-size:11px; margin-left:2px;}
.cb-logtag{font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; width:78px; text-align:center;}
.cb-logtag.use{background:var(--orange-soft); color:#C2570F;}
.cb-logtag.restock{background:#E4F6EC; color:var(--green);}

/* time clock */
.cb-clockcard{display:flex; align-items:center; justify-content:space-between; gap:16px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px;}
.cb-clockcard.on{border-color:#BFE6CF; background:#F4FCF7;}
.cb-clock-left{display:flex; align-items:center; gap:14px;}
.cb-clock-dot{width:12px; height:12px; border-radius:50%; background:#C7D2DE;}
.cb-clockcard.on .cb-clock-dot{background:var(--green); box-shadow:0 0 0 4px rgba(18,130,74,.15);}
.cb-clock-status{font-size:16px; font-weight:800;}
.cb-clock-sub{font-size:13px; color:var(--muted); margin-top:2px;}
.cb-clock-btn{display:inline-flex; align-items:center; gap:7px; border:0; cursor:pointer; font-size:14.5px; font-weight:750; padding:11px 20px; border-radius:11px; color:#fff; transition:filter .15s;}
.cb-clock-btn.in{background:var(--green);} .cb-clock-btn.out{background:var(--navy);}
.cb-clock-btn:hover{filter:brightness(.95);}
.cb-onnow{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:800; color:var(--green);}
.cb-pulse{width:8px; height:8px; border-radius:50%; background:var(--green); animation:cbpulse 1.6s infinite;}
@keyframes cbpulse{0%{box-shadow:0 0 0 0 rgba(18,130,74,.5);}70%{box-shadow:0 0 0 6px rgba(18,130,74,0);}100%{box-shadow:0 0 0 0 rgba(18,130,74,0);}}

/* marketing segments */
.cb-seg-row{display:grid; grid-template-columns:repeat(6,1fr); gap:10px;}
.cb-seg{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 12px; text-align:center;}
.cb-seg-n{font-size:20px; font-weight:800;}
.cb-seg-l{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px;}
.cb-tmpl-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:2px 0 13px;}
.cb-tmpl-label{font-size:12.5px; color:var(--muted); font-weight:700;}
.cb-tmpl{font-size:12.5px; font-weight:650; border:1px solid var(--line); background:#F7FAFD; color:var(--blue); padding:6px 11px; border-radius:999px; cursor:pointer; transition:.13s;}
.cb-tmpl:hover{border-color:var(--blue); background:var(--blue-soft);}
.cb-charcount{font-size:12px; color:var(--muted); margin-top:-6px;}

/* modal */
.cb-overlay{position:fixed; inset:0; background:rgba(14,42,71,.42); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;}
.cb-modal{background:#fff; border-radius:18px; width:100%; max-width:460px; max-height:90vh; overflow:auto; box-shadow:0 24px 60px rgba(14,42,71,.28); animation:cbpop .18s ease;}
.cb-modal-wide{max-width:560px;}
@keyframes cbpop{from{transform:translateY(8px) scale(.98); opacity:0;} to{transform:none; opacity:1;}}
.cb-modal-head{display:flex; align-items:flex-start; justify-content:space-between; padding:20px 22px 12px;}
.cb-modal-title{font-size:18px; font-weight:800; margin:0; letter-spacing:-.01em;}
.cb-modal-sub{font-size:13px; color:var(--muted); margin:3px 0 0;}
.cb-modal-body{padding:6px 22px 18px;}

.cb-book-shell{max-width:660px; margin:0 auto;}

.cb-book-tag{font-size:12.5px; color:#A9C0D8;}

.cb-book-card{background:#fff; border-radius:18px; padding:22px; box-shadow:0 24px 60px rgba(0,0,0,.28);}

.cb-book-note{background:#FBFCFE; border:1px solid var(--line); border-radius:10px; padding:10px 13px; font-size:13px; color:var(--muted); margin-bottom:14px;}

.cb-svc-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

.cb-date-strip{display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px;}
.cb-date{flex:0 0 auto; width:62px; border:1.5px solid var(--line); border-radius:12px; background:#fff; padding:9px 0; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; transition:.13s;}

.cb-confirm-btns{display:flex; gap:10px; justify-content:center;}

@media (max-width:560px){
