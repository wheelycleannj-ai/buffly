.cb-route-note{font-size:13px; color:var(--muted); padding:2px 16px 14px; line-height:1.5;}

/* job checklist / SOP */
.cb-chk-count{font-size:12px; font-weight:700; color:var(--muted); text-transform:none; letter-spacing:0;}
.cb-chk-bar{height:6px; border-radius:99px; background:var(--surface-2); border:1px solid var(--line); overflow:hidden; margin:2px 0 10px;}
.cb-chk-bar span{display:block; height:100%; background:var(--green); transition:width .2s;}
.cb-chk-list{display:flex; flex-direction:column; gap:6px;}
.cb-chk{display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; cursor:pointer; text-align:left; transition:background .12s;}
.cb-chk:hover{background:#eef3f9;}
.cb-chk.on{background:#F2FBF6; border-color:#BFE8CF;}
.cb-chk-box{display:inline-flex; align-items:center; justify-content:center; width:19px; height:19px; border-radius:6px; border:1.5px solid var(--line); background:#fff; flex-shrink:0;}
.cb-chk.on .cb-chk-box{background:var(--green); border-color:var(--green);}
.cb-chk-label{font-size:13.5px; color:var(--ink);}
.cb-chk.on .cb-chk-label{color:var(--muted); text-decoration:line-through;}
.cb-chk-finish{margin-top:10px; width:100%; display:flex; align-items:center; justify-content:center; gap:7px; padding:10px; border:0; border-radius:10px; background:var(--green); color:#fff; font-size:13.5px; font-weight:700; cursor:pointer;}

/* gift card — customer booking */
.cb-giftcard-cta{display:flex; align-items:center; gap:13px; width:100%; margin-top:14px; padding:14px 16px; border:1.5px dashed var(--bk); background:linear-gradient(135deg,#F0F7FF,#FFFFFF); border-radius:14px; cursor:pointer; text-align:left;}
.cb-giftcard-cta:hover{background:#E8F2FE;}
.cb-giftcard-cta-ic{width:42px; height:42px; border-radius:11px; background:var(--bk); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.cb-giftcard-cta-tx{flex:1; min-width:0;}
.cb-giftcard-cta-h{font-size:15px; font-weight:800; color:#0E2A47;}
.cb-giftcard-cta-sub{font-size:12.5px; color:#5b6b7d; margin-top:2px;}
.cb-giftcard-cta-arr{color:var(--bk); flex-shrink:0;}
.cb-gift-back{background:transparent; border:0; color:var(--bk); font-weight:700; font-size:13.5px; display:inline-flex; align-items:center; gap:3px; cursor:pointer; padding:0; margin-bottom:6px;}
.cb-gift-hero{text-align:center; padding:6px 0 8px;}
.cb-gift-hero-ic{width:54px; height:54px; border-radius:15px; background:var(--bk); color:#fff; display:inline-flex; align-items:center; justify-content:center;}
.cb-gift-hero-sub{font-size:13.5px; color:#5b6b7d; line-height:1.55; max-width:420px; margin:0 auto;}
.cb-gift-lbl{display:block; font-size:12px; font-weight:700; color:#46586b; margin:12px 0 6px;}
.cb-gift-amts{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.cb-gift-amt{padding:13px 8px; border:1.5px solid #DCE6F2; background:#fff; border-radius:11px; font-weight:800; font-size:15px; color:#0E2A47; cursor:pointer;}
.cb-gift-amt.on{border-color:var(--bk); background:#EAF4FE; color:var(--bk);}
.cb-gift-summary{display:flex; justify-content:space-between; align-items:center; margin:16px 0 12px; padding:14px 16px; background:#F0F7FF; border-radius:12px; font-size:14px; color:#0E2A47;}
.cb-gift-summary strong{font-size:20px; color:var(--bk);}
.cb-gift-check{background:var(--bk)!important;}
.cb-gift-codecard{margin:6px auto 4px; max-width:340px; padding:20px; border-radius:16px; background:linear-gradient(135deg,#0E2A47,var(--bk)); color:#fff; text-align:center; box-shadow:0 10px 30px rgba(21,119,217,.25);}
.cb-gift-codecard-top{display:flex; align-items:center; justify-content:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; opacity:.85;}
.cb-gift-codecard-amt{font-size:40px; font-weight:800; margin:8px 0 6px;}
.cb-gift-codecard-code{font-family:ui-monospace,Menlo,monospace; font-size:17px; font-weight:700; letter-spacing:.08em; background:rgba(255,255,255,.16); border-radius:9px; padding:8px;}
@media (max-width:480px){ .cb-gift-amts{grid-template-columns:repeat(2,1fr);} }

/* staff preview of customer booking page */
.cb-prev-bar{position:fixed; top:0; left:0; right:0; height:48px; z-index:3000; background:#0E2A47; color:#fff; display:flex; align-items:center; gap:10px; padding:0 14px; box-shadow:0 2px 12px rgba(0,0,0,.2);}
.cb-prev-tag{display:inline-flex; align-items:center; gap:6px; font-weight:800; font-size:12px; background:#F26A1B; color:#fff; padding:5px 11px; border-radius:99px; flex-shrink:0;}
.cb-prev-spacer{flex:1;}
.cb-prev-seg{display:flex; background:rgba(255,255,255,.1); border-radius:9px; padding:3px; gap:2px;}
.cb-prev-seg button{display:inline-flex; align-items:center; gap:5px; background:transparent; border:0; color:#c2cfe0; font-size:12.5px; font-weight:700; padding:5px 11px; border-radius:7px; cursor:pointer;}
.cb-prev-seg button.on{background:#fff; color:#0E2A47;}
.cb-prev-copy,.cb-prev-exit{display:inline-flex; align-items:center; gap:5px; flex-shrink:0; background:rgba(255,255,255,.13); color:#fff; border:0; border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:700; cursor:pointer;}
.cb-prev-copy:hover,.cb-prev-exit:hover{background:rgba(255,255,255,.24);}
.cb-prev-frame{padding-top:48px;}
.cb-prev-frame.phone{padding-top:48px; min-height:100vh; background:#11161f; display:flex; justify-content:center;}
.cb-prev-frame.phone .cb-prev-device{width:412px; max-width:calc(100vw - 24px); height:calc(100vh - 72px); margin:12px 0; overflow:auto; border-radius:30px; border:11px solid #05080d; box-shadow:0 24px 70px rgba(0,0,0,.5); background:#fff; -webkit-overflow-scrolling:touch;}
.cb-prev-frame.phone .cb-prev-device .cb-book{min-height:100%;}
.cb-prev-frame.phone .cb-chat-wrap{display:none;}
@media (max-width:560px){ .cb-prev-tag{padding:5px 8px;} .cb-prev-seg button span{display:none;} .cb-prev-copy span,.cb-prev-exit{font-size:0;} }

/* clickable address + directions */
.cb-detail-link{text-decoration:none; color:var(--ink); cursor:pointer;}
.cb-detail-link:hover{color:var(--blue);}
.cb-detail-link span:first-of-type{flex:1;}
.cb-dir-tag{color:var(--blue); font-weight:800; font-size:12px; white-space:nowrap; flex:none!important;}

/* address autocomplete */
.cb-addr{position:relative;}
.cb-addr-sug{position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:11px; box-shadow:0 12px 30px rgba(16,35,56,.16); z-index:30; overflow:hidden; max-height:240px; overflow-y:auto;}
.cb-addr-opt{display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:transparent; border:0; border-bottom:1px solid var(--line); padding:10px 12px; font-size:13px; color:var(--ink); cursor:pointer; transition:background .1s;}
.cb-addr-opt:last-child{border-bottom:0;}
.cb-addr-opt:hover{background:var(--surface-2);}
.cb-addr-opt svg{color:var(--blue); flex-shrink:0;}
.cb-addr-opt span{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.cb-addr-busy{padding:10px 12px; font-size:12.5px; color:var(--muted); font-weight:600;}

/* calendar gross totals */
.cb-grosspill{margin-left:auto; display:inline-flex; align-items:center; gap:4px; background:#E4F6EC; color:#12824A; border:1px solid #BFE8CF; border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:800; white-space:nowrap;}
.cb-calsum{display:flex; align-items:baseline; gap:10px; padding:11px 4px 14px; flex-wrap:wrap;}
.cb-calsum > span:first-child{font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);}
.cb-calsum strong{font-size:22px; font-weight:850; color:#12824A; font-variant-numeric:tabular-nums;}
.cb-calsum-n{font-size:12.5px; color:var(--muted); font-weight:600;}
.cb-weekcol-gross{font-size:11px; font-weight:800; color:#12824A; margin-top:2px;}

/* segmented toggle (job modal: existing/new customer) */
.cb-seg{display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:3px;}
.cb-seg button{border:0; background:transparent; padding:7px 14px; border-radius:7px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; transition:.12s;}
.cb-seg button:hover{color:var(--ink);}
.cb-seg button.on{background:var(--navy); color:#fff;}

/* job add-on chips */
.cb-job-addons{display:flex; flex-wrap:wrap; gap:7px;}
.cb-addchip{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:6px 11px; font-size:12.5px; font-weight:650; color:var(--ink); cursor:pointer; transition:.12s;}
.cb-addchip:hover{border-color:var(--blue); background:#EFF5FE;}
.cb-addchip span{color:var(--muted); font-weight:700;}
.cb-addchip.on{background:var(--navy); border-color:var(--navy); color:#fff;}
.cb-addchip.on span{color:#AFC6E6;}

/* week view */
.cb-week{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
.cb-weekcol{background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; min-height:170px; display:flex; flex-direction:column;}
.cb-weekcol.today{border-color:var(--blue); box-shadow:0 0 0 2px rgba(47,107,216,.15);}
.cb-weekcol-head{display:flex; flex-direction:column; align-items:center; gap:1px; padding:9px 4px; background:var(--surface-2); border:0; border-bottom:1px solid var(--line); cursor:pointer; width:100%;}
.cb-weekcol-head:hover{background:#EAF1FB;}
.cb-weekcol-dow{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--muted);}
.cb-weekcol.today .cb-weekcol-dow{color:var(--blue);}
.cb-weekcol-num{font-size:16px; font-weight:800; color:var(--ink);}
.cb-weekcol-body{padding:7px; display:flex; flex-direction:column; gap:6px; flex:1;}
.cb-weekcol-empty{color:#C2CEDB; text-align:center; font-size:13px; padding:8px 0;}
.cb-weekjob{text-align:left; background:var(--surface-2); border:0; border-left:3px solid var(--blue); border-radius:7px; padding:7px 8px; cursor:pointer; transition:background .12s;}
.cb-weekjob:hover{background:#EAF1FB;}
.cb-weekjob-t{font-size:11px; font-weight:800; color:var(--ink);}
.cb-weekjob-n{font-size:12px; font-weight:700; color:var(--ink); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.cb-weekjob-s{font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
@media (max-width:760px){ .cb-week{grid-template-columns:1fr;} .cb-weekcol{min-height:0;} }

/* map view */
.cb-mapcard{padding:0; overflow:hidden;}
.cb-map{height:640px; width:100%; background:#E7F1FB; z-index:1;}
.cb-maplegend{display:flex; flex-wrap:wrap; gap:18px; padding:14px 16px; border-top:1px solid var(--line); font-size:13.5px; font-weight:700; color:var(--muted);}
.cb-maplegend span{display:inline-flex; align-items:center; gap:6px;}
.cb-maplegend i{width:12px; height:12px; border-radius:50%; display:inline-block; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.15);}
.cb-map-note{padding:0 16px 13px; font-size:12px; color:var(--muted);}
.leaflet-container{font:inherit;}

/* csv import preview */
.cb-imp-prev{border:1px solid var(--line); border-radius:11px; overflow:hidden; margin-top:12px;}
.cb-imp-row{padding:10px 13px; border-bottom:1px solid var(--line);}
.cb-imp-row:last-child{border-bottom:0;}
.cb-imp-name{font-size:13.5px; font-weight:750; color:var(--ink);}
.cb-imp-meta{font-size:12px; color:var(--muted); margin-top:2px;}
.cb-imp-more{padding:9px 13px; font-size:12px; font-weight:700; color:var(--muted); background:var(--surface-2);}

/* logo upload */
.cb-logo-up{display:flex; align-items:center; gap:14px;}
.cb-logo-prev{width:84px; height:64px; border:1px dashed var(--line); border-radius:11px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;}
.cb-logo-prev img{max-width:100%; max-height:100%; object-fit:contain;}
.cb-logo-ph{color:#B7C4D3;}
.cb-logo-actions{display:flex; gap:8px; flex-wrap:wrap;}
.cb-logo-btn{cursor:pointer;}
.cb-pref-hint{font-size:11.5px; color:var(--muted); margin-top:7px; display:block; line-height:1.4;}

/* booking header logo image */
.cb-book .cb-logo.cb-logo-img{width:auto!important; min-width:64px; height:74px; padding:9px 16px; background:#fff!important; border:1px solid #E6EDF6; border-radius:16px; box-shadow:0 10px 26px rgba(14,42,71,.16)!important;}
.cb-book .cb-logo.cb-logo-img::after{display:none;}
.cb-book-logo-img{height:100%; width:auto; max-width:260px; object-fit:contain; display:block;}
.cb-book .cb-book-top{position:relative; flex-direction:column; align-items:center; text-align:center; margin-bottom:24px;}
.cb-book .cb-book-signin{position:absolute; top:0; right:0;}
.cb-book .cb-book-brand{flex-direction:column; align-items:center; gap:14px;}
.cb-book .cb-book-brand .cb-logo{width:74px; height:74px; border-radius:18px;}
.cb-book .cb-book-name{font-size:25px; margin-top:2px;}
.cb-book .cb-book-tag{font-size:13.5px;}
@media (max-width:480px){ .cb-book-logo-img{max-width:200px;} .cb-book .cb-book-signin{font-size:12px;} }

/* monthly analytics */
.cb-an-month{max-width:210px;}
.cb-an-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:16px; margin-bottom:16px;}
.cb-an-h{font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:14px;}
.cb-an-line{display:flex; align-items:baseline; justify-content:space-between; gap:14px; padding:9px 0; font-size:14px; border-bottom:1px solid var(--line);}
.cb-an-line em{color:var(--muted); font-style:normal; font-size:12px; font-weight:600;}
.cb-an-line strong{font-weight:750; font-variant-numeric:tabular-nums;}
.cb-an-line.sub{color:var(--muted); font-size:13px;}
.cb-an-line.sub strong{color:#C2410C; font-weight:700;}
.cb-an-line.net{border-bottom:0; border-top:2px solid var(--ink); margin-top:4px; padding-top:13px; font-size:16px; font-weight:800;}
.cb-an-line.net strong{font-size:22px; color:var(--green);}
.cb-an-foot{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.45;}
.cb-an-assume{display:flex; flex-direction:column; gap:11px;}
.cb-an-f{display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:13px; font-weight:600; color:var(--ink);}
.cb-an-f .cb-input{max-width:108px; text-align:right;}
.cb-an-bars{display:flex; align-items:flex-end; gap:18px; height:180px; padding:6px 4px 0;}
.cb-an-bar{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%;}
.cb-an-barval{font-size:11.5px; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;}
.cb-an-bartrack{flex:1; width:100%; max-width:48px; display:flex; align-items:flex-end; background:var(--surface-2); border-radius:8px 8px 0 0; overflow:hidden;}
.cb-an-barfill{width:100%; background:linear-gradient(180deg,#34B36B,#1E9E5A); border-radius:8px 8px 0 0; min-height:4px; transition:height .4s;}
.cb-an-barlbl{font-size:11px; font-weight:700; color:var(--muted);}
@media (max-width:720px){ .cb-an-grid{grid-template-columns:1fr;} }

/* KPI cards */
.cb-kpis{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px;}
.cb-kpi{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 15px;}
.cb-kpi-l{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--muted);}
.cb-kpi-v{font-size:23px; font-weight:850; color:var(--ink); margin-top:6px; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
.cb-kpi-v.green{color:#12824A;} .cb-kpi-v.orange{color:#C2410C;}
.cb-kpi-s{font-size:11.5px; color:var(--muted); margin-top:3px; font-weight:600;}
@media (max-width:900px){ .cb-kpis{grid-template-columns:repeat(2,1fr);} }

/* analytics 2-col grid + horizontal bars */
.cb-an-grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;}
@media (max-width:720px){ .cb-an-grid2{grid-template-columns:1fr;} }
.cb-hbar{margin-bottom:11px;}
.cb-hbar:last-child{margin-bottom:0;}
.cb-hbar-top{display:flex; justify-content:space-between; align-items:baseline; gap:10px; font-size:13px; margin-bottom:5px;}
.cb-hbar-top span{font-weight:650; color:var(--ink);}
.cb-hbar-top em{color:var(--muted); font-style:normal; font-size:11.5px; font-weight:600;}
.cb-hbar-top strong{font-weight:800; font-variant-numeric:tabular-nums;}
.cb-hbar-track{height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden;}
.cb-hbar-fill{height:100%; background:linear-gradient(90deg,#34B36B,#1E9E5A); border-radius:99px;}
.cb-hbar-fill.blue{background:linear-gradient(90deg,#4A87E0,#2F6BD8);}

/* work mix split */
.cb-split-bar{display:flex; height:16px; border-radius:99px; overflow:hidden; background:var(--surface-2); margin-bottom:14px;}
.cb-split-mobile{background:#2F6BD8;} .cb-split-shop{background:#F26A1B;}
.cb-mini-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
.cb-mini-stats > div{background:var(--surface-2); border-radius:10px; padding:9px; text-align:center;}
.cb-mini-stats span{display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;}
.cb-mini-stats strong{display:block; font-size:18px; font-weight:800; color:var(--ink); margin-top:2px;}

/* pipeline */
.cb-pipe-row{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
.cb-pipe-stat{background:var(--surface-2); border-radius:12px; padding:14px; text-align:center;}
.cb-pipe-v{font-size:21px; font-weight:850; color:var(--navy); font-variant-numeric:tabular-nums;}
.cb-pipe-l{font-size:11.5px; color:var(--muted); font-weight:650; margin-top:3px;}
@media (max-width:720px){ .cb-pipe-row{grid-template-columns:repeat(2,1fr);} }

/* ===================== PREFERENCES ===================== */
.cb-pref-tabbar{display:flex; flex-wrap:wrap; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; padding-bottom:2px;}
.cb-pref-tab{border:0; background:transparent; color:var(--muted); font-size:12.5px; font-weight:750; letter-spacing:.02em; padding:9px 13px; border-radius:8px 8px 0 0; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:.13s; white-space:nowrap;}
.cb-pref-tab:hover{color:var(--ink); background:#F4F7FB;}
.cb-pref-tab.active{color:var(--orange-2); border-bottom-color:var(--orange);}
.cb-pref-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;}
.cb-pref-card{display:flex; align-items:flex-start; gap:13px; text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 16px 18px; cursor:pointer; transition:.14s; box-shadow:0 1px 2px rgba(16,35,56,.04);}
.cb-pref-card:hover{border-color:var(--orange); box-shadow:0 8px 22px rgba(16,35,56,.10); transform:translateY(-1px);}
.cb-pref-ic{width:38px; height:38px; flex-shrink:0; border-radius:11px; background:var(--blue-soft); color:var(--blue); display:flex; align-items:center; justify-content:center;}
.cb-pref-ic.lg{width:44px; height:44px; border-radius:13px;}
.cb-pref-ct{flex:1; min-width:0;}
.cb-pref-title{font-size:15px; font-weight:800; color:var(--ink); letter-spacing:-.01em;}
.cb-pref-desc{font-size:12.5px; color:var(--muted); line-height:1.45; margin-top:5px;}
.cb-pref-arrow{color:#B7C4D3; flex-shrink:0; margin-top:3px;}
.cb-pref-card:hover .cb-pref-arrow{color:var(--orange);}
.cb-pref-back{display:inline-flex; align-items:center; gap:5px; background:none; border:0; color:var(--muted); font-weight:750; font-size:13px; cursor:pointer; padding:4px 0; margin-bottom:6px;}
.cb-pref-back:hover{color:var(--orange-2);}
.cb-pref-headrow{display:flex; align-items:center; gap:13px;}
.cb-pref-lead{font-size:13.5px; color:var(--muted); line-height:1.55; margin:-4px 0 18px; max-width:640px;}
.cb-pref-editor{max-width:640px; display:flex; flex-direction:column; gap:16px;}
.cb-pref-field{display:flex; flex-direction:column; gap:6px;}
.cb-pref-flabel{font-size:13px; font-weight:700; color:var(--ink);}
.cb-pref-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:4px 0;}
.cb-switch{position:relative; width:46px; height:26px; border-radius:999px; border:0; background:#CBD6E2; cursor:pointer; flex-shrink:0; transition:.18s; padding:0;}
.cb-switch.on{background:var(--orange);}
.cb-switch-dot{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:.18s;}
.cb-switch.on .cb-switch-dot{transform:translateX(20px);}
.cb-color-row{display:flex; align-items:center; gap:10px;}
.cb-color{width:46px; height:40px; padding:2px; border:1px solid var(--line); border-radius:9px; background:#fff; cursor:pointer; flex-shrink:0;}
.cb-color-row .cb-input{max-width:140px;}
.cb-pref-foot{display:flex; align-items:center; gap:14px; padding-top:4px; border-top:1px solid var(--line); margin-top:2px; padding-top:16px;}
.cb-pref-saved{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:750; color:var(--green);}
@media (max-width:560px){ .cb-pref-grid{grid-template-columns:1fr;} }

/* staff editor */
.cb-staff-row{display:flex; align-items:center; gap:13px; padding:13px 16px; border-bottom:1px solid var(--line);}
.cb-staff-row:last-child{border-bottom:0;}
.cb-staff-main{flex:1; min-width:0;}
.cb-staff-roles{display:flex; gap:6px; flex-shrink:0;}
.cb-roletog{display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line); background:#fff; color:var(--muted); font-size:12px; font-weight:750; padding:7px 11px; border-radius:9px; cursor:pointer; transition:.13s;}
.cb-roletog:hover{border-color:#B9CCE2;}
.cb-roletog.on{background:var(--orange-soft); color:var(--orange-2); border-color:transparent;}
.cb-icon-btn.danger:hover{color:#D7263D; border-color:#F3C0C7;}
@media (max-width:620px){ .cb-staff-roles .cb-roletog span{display:none;} }

/* integrations */
.cb-int-grouph{font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:6px 0 10px;}
.cb-int-card{max-width:640px; margin-bottom:14px; display:flex; flex-direction:column; gap:13px;}
.cb-int-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
.cb-int-id{display:flex; gap:12px; align-items:center;}

.cb-int-name{font-size:15px; font-weight:800; color:var(--ink);}
.cb-int-sub{font-size:12.5px; color:var(--muted); line-height:1.4; margin-top:2px;}
.cb-int-badge{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:800; padding:5px 11px; border-radius:999px; background:#EEF2F7; color:var(--muted); white-space:nowrap; flex-shrink:0;}

/* AI draft panel in composer */
.cb-ai-panel{background:linear-gradient(180deg,#FFF6F0,#FFFCFA); border:1px solid #FBD9C2; border-radius:13px; padding:14px; margin-bottom:16px;}
.cb-ai-h{display:flex; align-items:center; gap:7px; font-size:13px; font-weight:800; color:#C75412; margin-bottom:10px;}
.cb-ai-row{display:flex; gap:8px;}
.cb-ai-row .cb-input{flex:1;}
.cb-ai-chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
.cb-ai-chip{border:1px solid #F0CDB6; background:#fff; color:#9A4D1E; font-size:12px; font-weight:700; padding:6px 11px; border-radius:999px; cursor:pointer; transition:.13s;}
.cb-ai-chip:hover{background:#FFF1E8; border-color:var(--orange);}

/* customer chat widget */
.cb-chat-wrap{position:fixed; right:20px; bottom:20px; z-index:60; display:flex; flex-direction:column; align-items:flex-end; gap:12px;}
.cb-chat-fab{width:56px; height:56px; border-radius:50%; border:0; background:var(--orange); color:#fff; cursor:pointer; box-shadow:0 10px 26px rgba(242,106,27,.45); display:flex; align-items:center; justify-content:center; transition:transform .15s;}
.cb-chat-fab:hover{transform:scale(1.06);}
.cb-chat{width:340px; max-width:calc(100vw - 40px); height:480px; max-height:calc(100vh - 120px); background:#fff; border:1px solid #E6EDF6; border-radius:18px; box-shadow:0 24px 64px rgba(20,50,90,.28); display:flex; flex-direction:column; overflow:hidden;}
.cb-chat-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 15px; background:#0E2A47; color:#fff;}
.cb-chat-id{display:flex; align-items:center; gap:10px;}
.cb-chat-av{width:32px; height:32px; border-radius:50%; background:var(--orange); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.cb-chat-name{font-size:14px; font-weight:800;}
.cb-chat-status{font-size:11px; color:#A9C0D8;}
.cb-chat-x{background:rgba(255,255,255,.12); border:0; color:#fff; width:28px; height:28px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
.cb-chat-x:hover{background:rgba(255,255,255,.22);}
.cb-chat-body{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:9px; background:#F7FAFD;}
.cb-chat-msg{max-width:84%; font-size:13px; line-height:1.45; padding:9px 12px; border-radius:13px;}
.cb-chat-msg.bot{background:#fff; border:1px solid #E6EDF6; color:#2A4259; align-self:flex-start; border-bottom-left-radius:4px;}
.cb-chat-msg.user{background:var(--orange); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
.cb-chat-quick{display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px 0; background:#F7FAFD;}
.cb-chat-quick button{border:1px solid #D9E3EE; background:#fff; color:#3A5168; font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;}

.cb-chat-input{display:flex; gap:8px; padding:12px; background:#F7FAFD; border-top:1px solid #E6EDF6;}
.cb-chat-input input{flex:1; border:1px solid #D9E3EE; border-radius:10px; padding:10px 12px; font-size:13.5px; font-family:inherit; color:#0E2A47; background:#fff; outline:0;}
.cb-chat-input input:focus{border-color:var(--orange);}
.cb-chat-input button{width:40px; border:0; border-radius:10px; background:var(--orange); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

/* gloss sweep on the logo mark — same signature as the landing page */
.cb-logo{box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 6px 16px rgba(242,106,27,.45); overflow:hidden;}
.cb-logo::after{content:""; position:absolute; inset:0; background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.55) 50%,transparent 60%); transform:translateX(-130%); animation:cbsweep 5s ease-in-out 1.2s infinite;}
@keyframes cbsweep{0%,72%{transform:translateX(-130%)} 88%,100%{transform:translateX(130%)}}

.cb-notif-top{display:flex; align-items:center; gap:8px; margin-bottom:5px; flex-wrap:wrap;}
.cb-notif-ch{font-size:11px; font-weight:700; color:var(--blue); background:var(--blue-soft); padding:2px 7px; border-radius:20px;}
.cb-notif-at{font-size:11px; color:var(--muted); margin-left:auto;}
.cb-notif-body{font-size:12.5px; color:var(--ink); line-height:1.45;}
/* street view */
.cb-sv{display:block; position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--line); text-decoration:none; margin-bottom:4px;}
.cb-sv img{display:block; width:100%; height:auto;}
.cb-sv-tag{position:absolute; right:10px; bottom:10px; background:rgba(14,42,71,.86); color:#fff; font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px;}
.cb-sv-empty{display:flex; align-items:center; justify-content:center; text-align:center; padding:22px 16px; background:var(--surface-2); color:var(--muted);}
.cb-sv-empty>div{display:flex; flex-direction:column; align-items:center; gap:4px;}
.cb-sv-empty svg{color:var(--blue);}
.cb-sv-empty .cb-sv-link{color:var(--blue); font-weight:700; font-size:13.5px;}
.cb-sv-empty .cb-sv-hint{font-size:11px; color:var(--muted); max-width:300px;}

/* crew multi-select chips */
.cb-crewpick{display:flex; flex-wrap:wrap; gap:7px;}
.cb-crewchip{display:inline-flex; align-items:center; gap:4px; border:1.5px solid var(--line); background:var(--surface); color:var(--ink); border-radius:20px; padding:7px 12px; font-size:12.5px; font-weight:700; cursor:pointer; transition:border-color .12s, color .12s, background .12s;}
.cb-crewchip:hover{border-color:var(--blue); color:var(--blue);}
.cb-crewchip.on{background:var(--blue); border-color:var(--blue); color:#fff;}
.cb-crew-ro{font-size:13.5px; color:var(--ink); font-weight:600; padding:6px 0;}
/* clickable dashboard rows / stats / pipeline */
.cb-row-click{width:100%; text-align:left; background:transparent; border:none; border-bottom:1px solid var(--line); font:inherit; color:inherit; cursor:pointer; transition:background .12s;}
.cb-row-click:hover{background:var(--surface-2);}
.cb-stat-btn{width:100%; font:inherit; color:inherit; text-align:left; cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .05s;}
.cb-stat-btn:hover{border-color:var(--blue); box-shadow:0 5px 16px rgba(31,111,235,.13);}
.cb-stat-btn:active{transform:translateY(1px);}
.cb-pipe-click{width:100%; font:inherit; color:inherit; background:transparent; border:none; border-bottom:1px solid var(--line); cursor:pointer; transition:background .12s; padding-left:6px; padding-right:6px; margin:0 -6px; border-radius:7px;}
.cb-pipe-click:hover{background:var(--surface-2);}
/* multi-account login */
.cb-login-switch{display:inline-flex; align-items:center; justify-content:center; gap:6px; width:100%; background:transparent; border:none; color:var(--muted); font-size:12.5px; font-weight:700; cursor:pointer; padding:9px 8px; margin-top:2px;}
.cb-login-switch:hover{color:var(--blue);}
.cb-newshop{display:flex; flex-direction:column; gap:11px; margin-bottom:12px;}
.cb-acct-row{display:flex; align-items:stretch; gap:8px;}
.cb-acct-main{flex:1;}
.cb-acct-del{flex-shrink:0; width:48px; border:1px solid var(--line); background:#fff; border-radius:12px; color:#C2410C; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .12s, border-color .12s;}
.cb-acct-del:hover{background:#FEF2EC; border-color:#F0B79C;}
.cb-bookcta:disabled{opacity:.5; cursor:default;}
.cb-svc-empty{grid-column:1/-1; text-align:center; padding:26px 16px; color:var(--muted); font-size:13.5px; border:1px dashed var(--line); border-radius:14px;}
/* card on file */
.cb-cardchip{display:inline-flex; align-items:center; gap:7px; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:7px 11px; font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:10px;}
.cb-cardchip-tag{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:#12824A; background:#E4F6EC; padding:2px 7px; border-radius:20px;}
.cb-card-note{display:flex; align-items:flex-start; gap:6px; font-size:11px; color:var(--muted); line-height:1.45; margin-top:8px;}
.cb-card-note svg{flex-shrink:0; margin-top:1px; color:#12824A;}
.cb-card-rm{background:transparent; border:none; color:#C2410C; font-size:11.5px; font-weight:700; cursor:pointer; margin-left:6px;}
.cb-card-rm:hover{text-decoration:underline;}
.cb-cardrow{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-top:10px;}
.cb-cardrow-l{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--ink);}
.cb-card-charge{background:var(--blue); border:none; color:#fff; font-size:12.5px; font-weight:700; border-radius:9px; padding:8px 13px; cursor:pointer; transition:filter .12s;}
.cb-card-charge:hover{filter:brightness(1.06);}
/* services starter empty state */
.cb-svc-empty-card{text-align:center; padding:34px 20px; border:1px dashed var(--line); border-radius:16px; background:var(--surface-2);}
.cb-svc-empty-h{font-size:16px; font-weight:800; color:var(--ink);}
.cb-svc-empty-sub{font-size:13px; color:var(--muted); margin-top:5px; max-width:440px; margin-left:auto; margin-right:auto;}
.cb-svc-empty-btns{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px;}

/* ===================== mobile polish (real phones) ===================== */
@media (max-width:600px){
  html,body{overflow-x:hidden;}
  /* --- customer booking page (the front door) --- */
  .cb-book{padding:14px 11px 30px;}
  .cb-book-shell{max-width:100%;}
  .cb-book-card{padding:18px 14px; border-radius:16px;}
  .cb-book-h{font-size:19px; margin-bottom:14px;}
  .cb-book .cb-book-top{margin-bottom:18px;}
  .cb-book .cb-book-brand .cb-logo{width:62px; height:62px; border-radius:16px;}
  .cb-book .cb-book-name{font-size:22px;}
  .cb-book .cb-book-tag{font-size:12.5px;}
  .cb-book .cb-logo.cb-logo-img{height:62px; min-width:54px; padding:7px 12px;}
  .cb-book-logo-img{max-width:180px;}
  .cb-svc{padding:13px;}
  .cb-svc-blurb{font-size:11.5px;}
  .cb-addon{padding:11px 12px;}
  .cb-slot{padding:13px 4px;}
  .cb-slot-time{font-size:14px;}
  .cb-date{width:60px; padding:10px 0;}
  .cb-date-day{font-size:19px;}
  .cb-book-total{padding:13px 14px;}
  .cb-review-row{padding:11px 13px; font-size:13px;}
  .cb-giftcard-cta{padding:13px 14px;}
  /* thumb-friendly bottom nav */
  .cb-book-nav{gap:10px; margin-top:18px;}
  .cb-book-nav .cb-btn{flex:1; justify-content:center; padding:14px 12px; font-size:15px;}
  .cb-book-back{padding:14px 6px; font-size:14.5px;}
  .cb-confirm-btns .cb-btn{flex:1; justify-content:center; padding:14px;}
  /* chat fits the screen */
  .cb-chat-wrap{right:12px; bottom:12px; gap:10px;}
  .cb-chat{width:calc(100vw - 24px); height:68vh; max-height:calc(100vh - 92px);}
  /* --- staff console --- */
  .cb-main-inner{padding:18px 13px 46px; overflow-x:hidden;}
  .cb-h1{font-size:21px;}
  .cb-page-head{flex-wrap:wrap; row-gap:10px;}
  .cb-page-head > div:first-child{flex:1 1 auto;}
  .cb-drow{flex-wrap:wrap; row-gap:7px;}
  .cb-drow-amt{width:auto; margin-left:auto;}
  .cb-drow-action{width:100%; justify-content:flex-start;}
  .cb-an-month{max-width:100%; width:100%;}
  .cb-pref-grid{grid-template-columns:1fr;}
  .cb-pref-tabbar{overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch;}
  .cb-pref-tab{flex:0 0 auto;}
  .cb-prog{grid-template-columns:repeat(2,1fr);}
  /* modals slide up as bottom sheets */
  .cb-overlay{padding:0; align-items:flex-end;}
  .cb-modal,.cb-modal-wide{max-width:100%; width:100%; max-height:94vh; border-radius:20px 20px 0 0;}
  .cb-modal-head{padding:18px 18px 10px;}
  .cb-modal-body{padding:6px 18px 16px;}
  .cb-modal-foot{flex-wrap:wrap; gap:8px; padding:12px 18px;}
  .cb-modal-foot .cb-btn{flex:1; justify-content:center; padding:12px;}
}
`;

createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
